<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Portal</title>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f8fafc; }
        .sidebar { width: 300px; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        .section-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin: 25px 0 10px; font-weight: 800; letter-spacing: 1px; }
        .item-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .friend-btn { width: 100%; text-align: left; background: none; border: none; color: #cbd5e1; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; font-weight: 500; }
        .friend-btn:hover, .friend-btn.active { background: var(--primary); color: white; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; background: #f1f5f9; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 75%; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 2px; }
        .input-bar { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; background: white; }
        #msg-input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #e2e8f0; outline: none; background: #f8fafc; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:white; margin:0 0 5px;">OJT CONNECT</h2>
    <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 20px;">Secure Messaging Portal</p>
    
    <div class="section-label">People You May Know</div>
    <div id="suggestions-list"></div>

    <div class="section-label">Friend Requests</div>
    <div id="requests-list"></div>

    <div class="section-label">Messages</div>
    <div id="friends-list"></div>

    <div style="margin-top:auto; padding-top:20px; border-top:1px solid #1e293b;">
        <div style="font-size:0.8rem; margin-bottom:12px; color:#94a3b8;">Logged as: <b id="user-display" style="color:white"></b></div>
        <button onclick="logout()" style="width:100%; background:#ef4444; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:700;">LOGOUT</button>
    </div>
</div>

<div class="main">
    <div style="padding:18px 25px; border-bottom:1px solid #e2e8f0; font-weight:700; color:#1e293b; font-size:1.1rem;" id="chat-header">Select a friend</div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Write a message..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    // MAKE SURE TO UPDATE THIS URL AFTER RE-DEPLOYING
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-display').innerText = myName;
    let activeFriend = null;

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 2000);
    }

    function loadAll() {
        apiCall(`action=getFriends`, "renderFriends");
        apiCall(`action=getSuggestions`, "renderSuggestions");
        if(activeFriend) loadMessages();
    }

    window.renderFriends = (data) => {
        const d = typeof data === 'string' ? JSON.parse(data) : data;
        
        document.getElementById('requests-list').innerHTML = d.requests.map(r => `
            <div class="item-card">
                <span style="font-weight:600">${r.name}</span>
                <button onclick="acceptFriend('${r.name}')" style="background:#22c55e; border:none; color:white; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:0.8rem;">Accept</button>
            </div>
        `).join('') || '<div style="color:#64748b; font-size:0.75rem; padding-left:5px;">No new requests</div>';

        document.getElementById('friends-list').innerHTML = d.friends.map(f => `
            <button class="friend-btn ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')">
                <span style="margin-right:8px;">●</span>${f.name}
            </button>
        `).join('') || '<div style="color:#64748b; font-size:0.75rem; padding-left:5px;">Your chat list is empty</div>';
    };

    window.renderSuggestions = (data) => {
        const d = typeof data === 'string' ? JSON.parse(data) : data;
        document.getElementById('suggestions-list').innerHTML = d.slice(0, 4).map(u => `
            <div class="item-card">
                <span style="font-weight:500">${u.name}</span>
                <button onclick="addFriend('${u.name}')" style="background:none; border:none; color:var(--primary); font-weight:800; cursor:pointer;">ADD</button>
            </div>
        `).join('') || '<div style="color:#64748b; font-size:0.75rem; padding-left:5px;">No one new to add</div>';
    };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-header').innerText = name;
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = (msgs) => {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        loadMessages();
    }

    window.addFriend = (name) => apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "loadAll");
    window.acceptFriend = (name) => apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "loadAll");
    function logout() { localStorage.removeItem("username"); window.location.href="index.html"; }

    setInterval(loadAll, 5000);
    loadAll();
</script>

</body>
</html>
