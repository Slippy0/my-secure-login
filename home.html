<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal</title>
    <style>
        :root { --sidebar: #111827; --primary: #3b82f6; --bg: #f3f4f6; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar - Sliding Logic */
        .sidebar { 
            width: 280px; background: var(--sidebar); color: white; display: flex; 
            flex-direction: column; padding: 20px; transition: 0.3s; z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        }

        /* Main Chat Area - Forces height to fit screen */
        .main-chat { 
            flex: 1; display: flex; flex-direction: column; background: white; 
            width: 100%; height: 100vh; position: relative; 
        }

        .chat-header { 
            padding: 15px; border-bottom: 1px solid #eee; display: flex; 
            align-items: center; gap: 10px; font-weight: bold; background: white;
            height: 60px;
        }

        .menu-toggle { 
            display: none; background: #eee; border: none; padding: 8px 12px; 
            border-radius: 6px; cursor: pointer; font-size: 1.2rem;
        }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        /* Chat Window - Added padding-bottom so messages aren't hidden by the input */
        #chat-window { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 10px; background: #f9fafb;
            padding-bottom: 80px; 
        }

        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #e5e7eb; color: black; }

        /* FIXED INPUT AREA - This ensures it stays visible at the bottom */
        .input-area { 
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 12px; border-top: 1px solid #eee; display: flex; 
            gap: 8px; background: white; z-index: 5;
        }
        #msg-input { 
            flex: 1; padding: 12px; border: 1px solid #ddd; 
            border-radius: 20px; outline: none; font-size: 16px; /* 16px prevents iOS zoom */
        }
        .btn-send { 
            background: var(--primary); color: white; border: none; 
            padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        /* Sidebar Elements */
        .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
        input#user-search { flex: 1; padding: 10px; border-radius: 6px; border: none; background: #1f2937; color: white; width: 100%; }
        .btn-find { background: #0ea5e9; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .friends-list { flex: 1; overflow-y: auto; }
        .friend-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .friend-item.active { background: #1f2937; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
        .logout-btn { margin-top: 10px; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; }
        .close-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; margin-left: auto; }
        @media (max-width: 768px) { .close-btn { display: block; } }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <span style="font-weight: bold; color: #3b82f6;">OJT CONNECT v2.0</span>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <div class="search-box">
            <input type="text" id="user-search" placeholder="Search..." onkeypress="if(event.key==='Enter') doSearch()">
            <button class="btn-find" onclick="doSearch()">Find</button>
        </div>
        <div id="search-results"></div>
        <div class="friends-list" id="friends-list"></div>
        <div style="margin-top:auto; font-size: 0.8rem; border-top: 1px solid #374151; padding-top: 10px;">
            Logged as: <b id="my-name"></b>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <span id="chat-target">Select a friend</span>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">Send</button>
        </div>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem("username"); window.location.href = "index.html"; }

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        if(!q) return;
        apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = function(users) {
        const resBox = document.getElementById('search-results');
        resBox.innerHTML = users.map(u => `<div class="friend-item">${u.name} <span style="color:#38bdf8;margin-left:auto" onclick="addFriend('${u.name}')">+ Add</span></div>`).join('');
    };

    window.addFriend = function(name) { apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "loadFriends"); };

    function loadFriends() { apiCall(`action=getFriends`, "renderFriends"); }

    window.renderFriends = function(data) {
        const list = document.getElementById('friends-list');
        let html = "";
        if (data.requests?.length > 0) {
            html += `<div style="color:#6b7280; font-size:0.7rem; margin:10px 0;">REQUESTS</div>`;
            data.requests.forEach(r => {
                html += `<div class="friend-item" style="background:#1f2937;">${r.name} 
                <button onclick="acceptFriend('${r.name}')" style="background:#22c55e; border:none; color:white; padding:4px 8px; border-radius:4px; margin-left:auto;">Accept</button></div>`;
            });
        }
        html += `<div style="color:#6b7280; font-size:0.7rem; margin:10px 0;">MESSAGES</div>`;
        data.friends.forEach(f => {
            html += `<div class="friend-item ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')">
                <div class="dot"></div> <span>${f.name}</span></div>`;
        });
        list.innerHTML = html;
    };

    window.acceptFriend = function(name) { apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "loadFriends"); };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); 
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = function(msgs) {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value; input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { loadFriends(); if(activeFriend) loadMessages(); }, 5000);
    loadFriends();
</script>
</body>
</html>
