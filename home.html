<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT | Professional Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-gray: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-gray); 
            color: var(--text-dark);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--white);
            display: grid;
            grid-template-columns: 260px 1fr;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Sidebar UI */
        .sidebar {
            background: #0f172a;
            color: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 40px; }
        .user-profile { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: auto; }
        .user-name { display: block; font-weight: 600; font-size: 14px; }
        .status-dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Main Chat UI */
        .main-content { display: flex; flex-direction: column; background: var(--white); }
        
        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fdfdfd;
        }

        /* Message Bubbles */
        .msg-group { display: flex; flex-direction: column; max-width: 70%; }
        .msg-group.me { align-self: flex-end; align-items: flex-end; }
        .msg-group.other { align-self: flex-start; }

        .sender-name { font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 4px; padding: 0 5px; }
        
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .other .bubble { background: #f1f5f9; color: var(--text-dark); border-bottom-left-radius: 4px; }
        .me .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }

        /* Input Area */
        .input-wrapper {
            padding: 20px 30px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button.send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.send-btn:hover { opacity: 0.9; }

        .logout-btn {
            color: #ef4444;
            background: none;
            border: none;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            padding: 0;
            font-weight: 600;
        }

        /* Loading Animation */
        .loader { font-size: 12px; color: var(--text-light); text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div>
            <div class="brand">OJT PORTAL</div>
            <p style="font-size: 12px; opacity: 0.6;">Internship Management System v2.0</p>
        </div>
        
        <div class="user-profile">
            <span class="user-name"><span class="status-dot"></span> <span id="display-user">User</span></span>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <h2 style="font-size: 18px; margin: 0;">Communication Channel</h2>
            <div id="conn-status" style="font-size: 11px; font-weight: bold; color: #22c55e;">● SYSTEM LIVE</div>
        </div>

        <div id="chat-window">
            <div class="loader">Synchronizing with Secure Database...</div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Compose a message..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
    const myUsername = localStorage.getItem("username") || "Guest Account";
    document.getElementById('display-user').innerText = myUsername;

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    async function loadMessages() {
        try {
            const response = await fetch(`${scriptURL}?action=getMessages`);
            const messages = await response.json();
            const chatWindow = document.getElementById('chat-window');
            
            chatWindow.innerHTML = messages.map(m => {
                const isMe = m.user === myUsername;
                return `
                    <div class="msg-group ${isMe ? 'me' : 'other'}">
                        <span class="sender-name">${m.user}</span>
                        <div class="bubble">${m.text}</div>
                    </div>
                `;
            }).join('');
            chatWindow.scrollTop = chatWindow.scrollHeight;
            document.getElementById('conn-status').innerText = "● SYSTEM LIVE";
            document.getElementById('conn-status').style.color = "#22c55e";
        } catch (e) {
            document.getElementById('conn-status').innerText = "● OFFLINE / BLOCKED";
            document.getElementById('conn-status').style.color = "#ef4444";
        }
    }

    async function send() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myUsername)}&text=${encodeURIComponent(text)}`, { mode: 'no-cors' });
        
        // Instant UI update for better feel
        setTimeout(loadMessages, 500);
    }

    // Refresh every 5 seconds
    setInterval(loadMessages, 5000);
    loadMessages();
</script>

</body>
</html>
