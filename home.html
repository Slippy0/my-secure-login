<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OJT | Connect</title>
    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --chat-bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-weight: 800; font-size: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
        
        /* Search Portal Styles */
        #search-portal { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; }
        .search-input { width: 90%; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }
        .suggest-item { padding: 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .suggest-item:hover { background: var(--primary); }

        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-card { padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .friend-card:hover { background: #1e293b; }
        .friend-card.active { background: var(--primary); }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--chat-bg); }
        
        /* Message Bubbles */
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 4px; }

        .input-area { padding: 25px; border-top: 1px solid #e2e8f0; display: flex; gap: 15px; }
        #message-input { flex: 1; padding: 14px 20px; border: 1px solid #cbd5e1; border-radius: 30px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <span>OJT Portal</span>
        <button onclick="toggleSearch()" style="background:none; border:1px solid #475569; color:white; border-radius:5px; cursor:pointer;">+ Add</button>
    </div>
    
    <div id="search-portal" style="display:none;">
        <input type="text" class="search-input" id="search-box" placeholder="Search usernames..." onkeyup="doSearch()">
        <div id="search-results"></div>
    </div>

    <div class="friends-list" id="friends-list">
        <p style="font-size:11px; color:#94a3b8; margin-left:15px; font-weight:bold;">FRIENDS</p>
    </div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <span id="active-target">Select a friend to chat</span>
        <span id="status" style="font-size:11px; color:#22c55e;">● Live</span>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
    const scriptURL = "YOUR_NEW_DEPLOYMENT_URL";
    const myName = localStorage.getItem("username") || "Guest";
    let activeFriend = null;

    function toggleSearch() {
        const p = document.getElementById('search-portal');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(p.style.display === 'block') doSearch();
    }

    async function doSearch() {
        const q = document.getElementById('search-box').value;
        const res = await fetch(`${scriptURL}?action=searchUsers&me=${myName}&query=${q}`);
        const users = await res.json();
        document.getElementById('search-results').innerHTML = users.map(u => `
            <div class="suggest-item" onclick="addFriend('${u}')">
                <span>${u}</span> <span style="font-size:10px;">+ Add</span>
            </div>
        `).join('');
    }

    async function addFriend(name) {
        await fetch(`${scriptURL}?action=addFriend&me=${myName}&friend=${name}`, {mode:'no-cors'});
        toggleSearch();
        loadFriends();
    }

    async function loadFriends() {
        const res = await fetch(`${scriptURL}?action=getFriends&me=${myName}`);
        const friends = await res.json();
        document.getElementById('friends-list').innerHTML = friends.map(f => `
            <div class="friend-card ${activeFriend === f ? 'active' : ''}" onclick="openChat('${f}')">
                <div style="width:10px; height:10px; background:#22c55e; border-radius:50%;"></div> ${f}
            </div>
        `).join('');
    }

    function openChat(name) {
        activeFriend = name;
        document.getElementById('active-target').innerText = `Chatting with ${name}`;
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        const res = await fetch(`${scriptURL}?action=getMessages&me=${myName}&friend=${activeFriend}`);
        const data = await res.json();
        const win = document.getElementById('chat-window');
        win.innerHTML = data.map(m => `<div class="msg ${m.user === myName ? 'me' : 'other'}">${m.text}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('message-input');
        if(!input.value || !activeFriend) return;
        const txt = input.value;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${myName}&recipient=${activeFriend}&text=${encodeURIComponent(txt)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { loadFriends(); loadMessages(); }, 5000);
    loadFriends();
</script>
</body>
</html>
