<!DOCTYPE html>
<html>
<head>
    <title>OJT Portal</title>
    <style>
        :root { --sidebar: #111827; --primary: #3b82f6; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f3f4f6; }
        .sidebar { width: 280px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px; }
        .search-area { margin-bottom: 20px; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: none; background: #1f2937; color: white; box-sizing: border-box; }
        #search-results { background: #1f2937; border-radius: 4px; margin-top: 5px; font-size: 0.8rem; }
        .res-item { padding: 10px; border-bottom: 1px solid #374151; display: flex; justify-content: space-between; }
        .add-link { color: #3b82f6; cursor: pointer; font-weight: bold; }
        .section-title { color: #6b7280; font-size: 0.7rem; margin: 20px 0 10px; text-transform: uppercase; }
        .friend-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .friend-item:hover { background: #1f2937; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: #22c55e; }
        .offline { background: #9ca3af; }
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 0.9rem; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #e5e7eb; color: black; }
        .input-box { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size:1.2rem; font-weight:bold; margin-bottom:20px;">OJT CONNECT v2.0</div>
        <div class="search-area">
            <input type="text" id="user-search" placeholder="Search users..." onkeypress="if(event.key==='Enter') doSearch()">
            <div id="search-results"></div>
        </div>
        <div id="friends-list"></div>
        <div style="margin-top:auto; font-size:0.8rem; opacity:0.6;">Logged as: <span id="my-name"></span></div>
    </div>
    <div class="main">
        <div id="chat-window"></div>
        <div class="input-box">
            <input type="text" id="msg-input" placeholder="Type a message..." style="background:#f3f4f6; color:black;">
            <button onclick="send()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">Send</button>
        </div>
    </div>

<script>
    const scriptURL = "YOUR_NEW_DEPLOYMENT_URL_HERE";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    // Security Bypass API Call
    function api(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function doSearch() {
        const q = document.getElementById('user-search').value;
        if(!q) return;
        api(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = (users) => {
        const box = document.getElementById('search-results');
        box.innerHTML = users.map(u => `
            <div class="res-item">
                ${u.name} <span class="add-link" onclick="addFriend('${u.name}')">+ Add</span>
            </div>
        `).join('');
    };

    window.addFriend = (name) => {
        api(`action=addFriend&friend=${encodeURIComponent(name)}`, "afterAdd");
    };

    window.afterAdd = () => {
        alert("Request Sent!");
        document.getElementById('search-results').innerHTML = "";
        loadFriends();
    };

    function loadFriends() {
        api(`action=getFriends`, "renderFriends");
    }

    window.renderFriends = (data) => {
        let html = "";
        if(data.requests.length > 0) {
            html += `<div class="section-title">Requests</div>`;
            data.requests.forEach(r => {
                html += `<div class="friend-item" style="background:#1f2937;">
                    <span style="flex:1">${r.name}</span>
                    <button onclick="acceptFriend('${r.name}')" style="background:#22c55e; border:none; color:white; border-radius:4px; cursor:pointer;">Accept</button>
                </div>`;
            });
        }
        html += `<div class="section-title">Direct Messages</div>`;
        data.friends.forEach(f => {
            html += `<div class="friend-item" onclick="openChat('${f.name}')">
                <div class="dot ${f.online?'online':'offline'}"></div> ${f.name}
            </div>`;
        });
        document.getElementById('friends-list').innerHTML = html;
    };

    window.acceptFriend = (name) => {
        api(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "loadFriends");
    };

    function openChat(name) {
        activeFriend = name;
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        api(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = (msgs) => {
        const win = document.getElementById('chat-window');
        win.innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value || !activeFriend) return;
        const text = input.value;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { loadFriends(); if(activeFriend) loadMessages(); }, 5000);
    loadFriends();
</script>
</body>
</html>
