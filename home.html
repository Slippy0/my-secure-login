<script>
    const scriptURL = "PASTE_YOUR_NEW_DEPLOY_URL_HERE";
    const myUser = localStorage.getItem("username") || "Guest";
    document.getElementById('display-user').innerText = myUser;

    async function load() {
        try {
            const r = await fetch(`${scriptURL}?action=getMessages`);
            const data = await r.json();
            
            const window = document.getElementById('chat-window');
            window.innerHTML = data.map(m => `
                <div class="msg ${m.user === myUser ? 'my-msg' : ''}">
                    <div class="u-name">${m.user}</div>
                    <div class="msg-content">${m.text}</div>
                </div>
            `).join('');
            window.scrollTop = window.scrollHeight;
        } catch(e) {
            console.log("Still blocked? Check the Dangerous badge.");
        }
    }

    async function send() {
        const el = document.getElementById('chat-input');
        if(!el.value.trim()) return;
        const msg = el.value;
        el.value = "";
        
        // mode: 'no-cors' is vital because of that red 'Dangerous' badge
        await fetch(`${scriptURL}?action=sendMessage&username=${myUser}&text=${encodeURIComponent(msg)}`, {mode: 'no-cors'});
        setTimeout(load, 1000);
    }

    setInterval(load, 4000);
    load();
</script>
