<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Project - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877f2; --secondary: #42b72a; --bg: #f0f2f5; --error: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        #status-msg { margin-bottom: 20px; font-size: 14px; color: #606770; min-height: 20px; font-weight: 500; }
        
        .input-group { position: relative; width: 100%; margin-bottom: 12px; }
        input { width: 100%; padding: 14px; border: 1px solid #dddfe2; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #90949c; }
        
        .main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .toggle-link { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: none; }
        footer { margin-top: 20px; font-size: 10px; color: #90949c; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="form-title" style="margin-top:0;">Login</h2>
        <div id="status-msg">Student OJT Portal</div>
        
        <form id="authForm">
            <input type="hidden" name="action" id="actionField" value="login">
            
            <div class="input-group">
                <input type="text" name="username" id="userIn" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" id="passIn" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePassword()"></i>
            </div>
            
            <button type="submit" class="main-btn" id="submitBtn">Log In</button>
        </form>
        
        <hr style="border:0; border-top:1px solid #dddfe2; margin:20px 0;">
        <div id="toggle-text">New here? <a class="toggle-link" onclick="toggleView()">Create account</a></div>
        <footer>Educational Project - Do not use real passwords</footer>
    </div>

    <script>
        // REPLACE WITH YOUR NEW DEPLOYMENT URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
        let currentMode = 'login';

        function togglePassword() {
            const passInput = document.getElementById('passIn');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleView() {
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submitBtn');
            const action = document.getElementById('actionField');
            const toggleText = document.getElementById('toggle-text');
            const status = document.getElementById('status-msg');

            status.innerText = "Student OJT Portal";
            if (currentMode === 'login') {
                currentMode = 'register'; title.innerText = "Register"; btn.innerText = "Sign Up";
                btn.style.backgroundColor = "var(--secondary)"; action.value = "register";
                toggleText.innerHTML = 'Already have an account? <a class="toggle-link" onclick="toggleView()">Login</a>';
            } else {
                currentMode = 'login'; title.innerText = "Login"; btn.innerText = "Log In";
                btn.style.backgroundColor = "var(--primary)"; action.value = "login";
                toggleText.innerHTML = 'New here? <a class="toggle-link" onclick="toggleView()">Create account</a>';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msg = document.getElementById('status-msg');
            const btn = document.getElementById('submitBtn');
            
            msg.innerText = "⏳ Processing...";
            msg.style.color = "#606770";
            btn.disabled = true;

            const formData = new FormData(this);
            const params = new URLSearchParams(formData).toString();
            
            try {
                // Using mode: 'cors' is default, but handle redirect with text()
                const response = await fetch(`${scriptURL}?${params}`);
                const result = await response.text();
                
                msg.innerText = result;

                if (result.includes("Successful")) {
                    msg.style.color = "var(--secondary)";
                    if (currentMode === 'login') {
                        localStorage.setItem("username", formData.get("username")); 
                        setTimeout(() => window.location.href = "home.html", 1000);
                    } else {
                        setTimeout(() => toggleView(), 1500); // Switch to login after registering
                    }
                } else {
                    msg.style.color = "var(--error)";
                    btn.disabled = false;
                }
            } catch (error) { 
                msg.innerText = "❌ Connection Error. Check internet/script URL."; 
                msg.style.color = "var(--error)";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
