<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Dashboard</title>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 700px; margin: 15px auto; padding: 0 10px; }
        .card { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #chat-window { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 15px; border: 1px solid #dddfe2; border-radius: 8px; background: #f9f9f9; }
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg { padding: 8px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .my-msg-wrapper { align-items: flex-end; }
        .my-msg { background: var(--primary); color: white; }
        .other-msg-wrapper { align-items: flex-start; }
        .other-msg { background: #e4e6eb; color: #000; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; display: block; }
        .input-area { display: flex; gap: 8px; padding: 10px; background: white; border-radius: 25px; border: 1px solid #ddd; align-items: center; }
        #chat-input { flex: 1; border: none; outline: none; font-size: 15px; }
        .btn { cursor: pointer; border: none; background: none; font-size: 18px; color: var(--primary); }
    </style>
</head>
<body>
    <nav><strong>OJT Portal</strong> <a href="index.html" onclick="localStorage.clear()" style="color:white; font-size:12px;">Logout</a></nav>
    <div class="container">
        <div class="card">
            <h3 style="margin:0;">Hi, <span id="user-name">...</span></h3>
            <small id="online-list" style="color:green;">Connecting...</small>
        </div>
        <div class="card">
            <div id="chat-window">Loading...</div>
            <div class="input-area">
                <label class="btn">📎<input type="file" id="fileIn" style="display:none;" onchange="uploadFile(this)"></label>
                <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "REPLACE_WITH_YOUR_NEW_DEPLOYMENT_URL";
        const myName = localStorage.getItem("username") || "Guest";
        document.getElementById('user-name').innerText = myName;

        async function updateChat() {
            try {
                const [uRes, mRes] = await Promise.all([
                    fetch(`${scriptURL}?action=getOnlineUsers`),
                    fetch(`${scriptURL}?action=getMessages`)
                ]);
                const users = await uRes.json();
                const msgs = await mRes.json();
                
                document.getElementById('online-list').innerText = "Online: " + users.join(', ');
                
                const chatBox = document.getElementById('chat-window');
                chatBox.innerHTML = msgs.map(m => {
                    const isMe = m.user === myName;
                    let content = m.text;
                    
                    if (m.text.includes("google.com")) {
                        content = `<img src="${m.text}" class="chat-img" onclick="window.open('${m.text}')">`;
                    }

                    return `<div class="msg-wrapper ${isMe?'my-msg-wrapper':'other-msg-wrapper'}">
                        <small style="font-size:10px; color:gray;">${m.user}</small>
                        <div class="msg ${isMe?'my-msg':'other-msg'}">${content}</div>
                    </div>`;
                }).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) { document.getElementById('chat-window').innerText = "Error loading. Check Script URL."; }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
            setTimeout(updateChat, 1000);
        }

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            const chatInput = document.getElementById('chat-input');
            chatInput.placeholder = "Uploading...";
            chatInput.disabled = true;

            const reader = new FileReader();
            reader.onload = async () => {
                const payload = {
                    action: 'uploadFile',
                    username: myName,
                    fileName: file.name,
                    mimeType: file.type,
                    fileData: reader.result.split(',')[1]
                };
                
                await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload),
                    mode: 'no-cors' 
                });
                
                chatInput.placeholder = "Message...";
                chatInput.disabled = false;
                setTimeout(updateChat, 2000);
            };
            reader.readAsDataURL(file);
        }

        setInterval(updateChat, 5000);
        updateChat();
    </script>
</body>
</html>
