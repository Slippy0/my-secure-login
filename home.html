<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-dark: #4f46e5;
            --sidebar-bg: #0f172a;
            --main-bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--main-bg); }
        body { display: flex; }

        .sidebar { 
            width: 320px; background: var(--sidebar-bg); color: #fff; 
            display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(0,0,0,0.1); z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        }

        .sidebar-brand { padding: 30px 24px; font-size: 1.4rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .sidebar-brand::before { content: ''; width: 12px; height: 12px; background: var(--primary); border-radius: 3px; }

        .search-area { padding: 0 20px 20px; }
        .search-wrapper { 
            display: flex; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 12px; padding: 4px; transition: 0.2s;
        }
        #user-search { flex: 1; background: none; border: none; color: #fff; padding: 10px; outline: none; font-size: 0.9rem; }
        .btn-find { background: var(--primary); border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 16px; }
        .section-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 24px 0 12px 8px; }

        .suggest-item { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 14px; padding: 12px; margin-bottom: 8px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .suggest-name { font-size: 0.9rem; font-weight: 500; color: #cbd5e1; }
        .btn-add-mini { color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.8rem; padding: 6px 12px; border-radius: 8px; }

        .chat-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: 14px; cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        .chat-item:hover { background: var(--glass); }
        .chat-item.active { background: var(--primary); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        
        .avatar { 
            width: 44px; height: 44px; border-radius: 12px; background: #334155; 
            display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff;
            position: relative; flex-shrink: 0;
        }
        .active-dot { width: 12px; height: 12px; background: #22c55e; border: 3px solid var(--sidebar-bg); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; }

        .main-container { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        .chat-header { height: 80px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f5f9; }
        .header-user { display: flex; align-items: center; gap: 15px; }
        .header-name { font-weight: 700; font-size: 1.1rem; color: #1e293b; }

        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #fdfdff; }
        .msg { max-width: 70%; padding: 14px 18px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .msg.them { align-self: flex-start; background: #fff; color: #334155; border-radius: 18px 18px 18px 4px; border: 1px solid #e2e8f0; }

        .input-bar { padding: 20px 30px; background: #fff; display: flex; gap: 15px; align-items: center; }
        .input-wrapper { flex: 1; background: #f1f5f9; border-radius: 16px; padding: 4px 8px; display: flex; align-items: center; }
        #msg-input { flex: 1; background: none; border: none; padding: 12px; outline: none; font-size: 1rem; color: #1e293b; }
        .btn-round-send { width: 50px; height: 50px; background: var(--primary); border: none; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

        .sidebar-footer { padding: 20px; background: rgba(0,0,0,0.2); }
        .logout-btn { width: 100%; padding: 12px; background: #ef444420; color: #ef4444; border: 1px solid #ef444440; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .menu-btn { display: none; background: #f1f5f9; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">CONNECT</div>
        <div class="search-area">
            <div class="search-wrapper">
                <input type="text" id="user-search" placeholder="Search users..." onkeypress="if(event.key==='Enter') doSearch()">
                <button class="btn-find" onclick="doSearch()">Find</button>
            </div>
            <div id="search-results" style="margin-top:10px;"></div>
        </div>
        <div class="sidebar-scroll">
            <div class="section-label">Suggestions</div>
            <div id="suggestions-list"></div>
            <div class="section-label">Pending</div>
            <div id="requests-list"></div>
            <div class="section-label">Chats</div>
            <div id="friends-list"></div>
        </div>
        <div class="sidebar-footer">
            <span style="font-size:0.8rem; color:#94a3b8; margin-bottom:10px; display:block;">User: <b id="my-name" style="color:#fff"></b></span>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="main-container">
        <div class="chat-header">
            <div class="header-user">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="avatar" style="background: var(--primary); width: 48px; height: 48px;" id="header-avatar">?</div>
                <div style="display:flex; flex-direction:column">
                    <span id="chat-target" class="header-name">Choose a connection</span>
                    <span id="online-status" style="font-size: 0.75rem; color: #22c55e; display:none;">• Active</span>
                </div>
            </div>
        </div>
        <div id="chat-window"></div>
        <div class="input-bar">
            <div class="input-wrapper"><input type="text" id="msg-input" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()"></div>
            <button class="btn-round-send" onclick="send()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

<script>
    // REPLACE THIS URL WITH YOUR NEW DEPLOYMENT URL
    const scriptURL = "PASTE_YOUR_NEW_WEBAPP_URL_HERE";
    const myName = localStorage.getItem("username");
    
    if(!myName) { window.location.href = "index.html"; }
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem("username"); window.location.href = "index.html"; }

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 1500);
    }

    function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        if(!q) return;
        apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = function(users) {
        const resBox = document.getElementById('search-results');
        if(!users || users.length === 0) { resBox.innerHTML = '<div style="color:#94a3b8;font-size:0.8rem;padding:10px">No users found</div>'; return; }
        resBox.innerHTML = users.map(u => `<div class="suggest-item"><span>${u.name}</span><span class="btn-add-mini" onclick="addFriend('${u.name}')">+ Add</span></div>`).join('');
    };

    function loadSuggestions() { apiCall(`action=getSuggestions`, "renderSuggestions"); }
    window.renderSuggestions = function(data) {
        const list = document.getElementById('suggestions-list');
        list.innerHTML = (data && data.length > 0) ? data.slice(0, 3).map(u => `<div class="suggest-item"><span>${u.name}</span><span class="btn-add-mini" onclick="addFriend('${u.name}')">Add</span></div>`).join('') : '';
    };

    window.addFriend = function(name) { apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "afterAdd"); };
    window.afterAdd = function() { alert("Request Sent!"); document.getElementById('search-results').innerHTML = ""; loadFriends(); loadSuggestions(); };

    function loadFriends() { apiCall(`action=getFriends`, "renderFriends"); }
    window.renderFriends = function(data) {
        const list = document.getElementById('friends-list');
        const reqList = document.getElementById('requests-list');
        reqList.innerHTML = (data.requests?.length > 0) ? data.requests.map(r => `<div class="suggest-item"><span>${r.name}</span><span class="btn-add-mini" style="color:#22c55e" onclick="acceptFriend('${r.name}')">Accept</span></div>`).join('') : '<div style="color:#475569; font-size:0.75rem; padding-left:8px;">No requests</div>';
        list.innerHTML = data.friends.map(f => `<div class="chat-item ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')"><div class="avatar" style="background:${stringToColor(f.name)}">${f.name[0].toUpperCase()}<div class="active-dot"></div></div><span style="font-weight:600">${f.name}</span></div>`).join('');
    };

    window.acceptFriend = function(name) { apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "loadFriends"); };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        document.getElementById('header-avatar').innerText = name[0].toUpperCase();
        document.getElementById('header-avatar').style.background = stringToColor(name);
        document.getElementById('online-status').style.display = 'block';
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); 
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = function(msgs) {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `<div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>`).join('');
        const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value; input.value = "";
        // Direct fetch for sending (no-cors is okay for simple append)
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        loadMessages();
    }

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
        return "#" + "00000".substring(0, 6 - c.length) + c;
    }

    setInterval(() => { 
        loadFriends(); 
        loadSuggestions(); 
        if(activeFriend) loadMessages(); 
    }, 5000);
    
    loadFriends(); 
    loadSuggestions();
</script>
</body>
</html>
