<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Project - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877f2; --secondary: #42b72a; --bg: #f0f2f5; --error: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        #status-msg { margin-bottom: 20px; font-size: 14px; color: #606770; min-height: 20px; font-weight: 500; }
        .input-group { position: relative; width: 100%; margin-bottom: 12px; }
        input { width: 100%; padding: 14px; border: 1px solid #dddfe2; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }
        hr { border: 0; border-top: 1px solid #dddfe2; margin: 25px 0; }
        .toggle-link { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: none; }
        footer { margin-top: 20px; font-size: 10px; color: #90949c; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="form-title">Login</h2>
        <div id="status-msg">Student OJT Portal</div>
        <form id="authForm">
            <input type="hidden" name="action" id="actionField" value="login">
            <div class="input-group"><input type="text" name="username" placeholder="Username" required></div>
            <div class="input-group"><input type="password" name="password" placeholder="Password" required></div>
            <button type="submit" class="main-btn" id="submitBtn">Log In</button>
        </form>
        <hr>
        <div id="toggle-text">New here? <a class="toggle-link" onclick="toggleView()">Create account</a></div>
        <footer>© 2026 Student OJT System. Educational Use Only.</footer>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
        let currentMode = 'login';

        function toggleView() {
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submitBtn');
            const action = document.getElementById('actionField');
            const toggleArea = document.getElementById('toggle-text');
            if (currentMode === 'login') {
                currentMode = 'register'; title.innerText = "Register"; btn.innerText = "Sign Up";
                btn.style.backgroundColor = "var(--secondary)"; action.value = "register";
                toggleArea.innerHTML = 'Already have an account? <a class="toggle-link" onclick="toggleView()">Login here</a>';
            } else {
                currentMode = 'login'; title.innerText = "Login"; btn.innerText = "Log In";
                btn.style.backgroundColor = "var(--primary)"; action.value = "login";
                toggleArea.innerHTML = 'New here? <a class="toggle-link" onclick="toggleView()">Create account</a>';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msg = document.getElementById('status-msg');
            const btn = document.getElementById('submitBtn');
            msg.innerText = "Connecting..."; btn.disabled = true;
            
            const formData = new FormData(this);
            const params = new URLSearchParams(formData).toString();
            try {
                const response = await fetch(`${scriptURL}?${params}`);
                const result = await response.text();
                msg.innerText = result;
                if (result.includes("Successful")) {
                    msg.style.color = "var(--secondary)";
                    if (currentMode === 'login') {
                        localStorage.setItem("ojt_user", formData.get("username"));
                        setTimeout(() => window.location.href = "home.html", 1200);
                    }
                } else { msg.style.color = "var(--error)"; }
            } catch (error) { msg.innerText = "Server Error."; }
            btn.disabled = false;
        });
    </script>
</body>
</html>
