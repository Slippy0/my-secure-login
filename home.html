<!DOCTYPE html>
<html>
<head>
    <title>OJT Chat</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #chat-window { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
        .msg-container { display: flex; flex-direction: column; }
        .msg-user { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 2px; }
        .msg-text { background: #e4e6eb; padding: 8px 12px; border-radius: 15px; font-size: 14px; width: fit-content; max-width: 80%; }
        .my-msg { align-self: flex-end; }
        .my-msg .msg-text { background: #1877f2; color: white; }
        .my-msg .msg-user { align-self: flex-end; }
        .input-area { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: #1877f2; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>User: <span id="display-username" style="color:#1877f2;">...</span></h3>
            <a href="index.html" onclick="localStorage.clear()" style="font-size:12px; color:gray;">Logout</a>
        </div>
        
        <div id="chat-window">Connecting...</div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Write a message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR NEW DEPLOYMENT URL
        const scriptURL = "PASTE_YOUR_NEW_URL_HERE";
        const myName = localStorage.getItem("username") || "Guest";
        document.getElementById('display-username').innerText = myName;

        async function loadMessages() {
            try {
                const res = await fetch(`${scriptURL}?action=getMessages`);
                const data = await res.json();
                const window = document.getElementById('chat-window');
                
                window.innerHTML = data.map(m => {
                    const isMe = m.user === myName;
                    return `
                        <div class="msg-container ${isMe ? 'my-msg' : ''}">
                            <div class="msg-user">${m.user}</div>
                            <div class="msg-text">${m.text}</div>
                        </div>
                    `;
                }).join('');
                window.scrollTop = window.scrollHeight;
            } catch (e) { console.log("Fetch error"); }
        }

        async function send() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = "";

            await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&text=${encodeURIComponent(msg)}`, { mode: 'no-cors' });
            setTimeout(loadMessages, 500);
        }

        setInterval(loadMessages, 3000);
        loadMessages();
    </script>
</body>
</html>
