<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --sidebar-bg: #0f172a; --main-bg: #f8fafc; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; display: flex; background: var(--main-bg); }

        /* SIDEBAR */
        .sidebar { width: 320px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: -320px; height: 100%; width: 85%; } .sidebar.open { left: 0; } }
        .sidebar-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .section-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 20px; }
        
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 15px; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .chat-item:hover { background: var(--glass); }
        .chat-item.active { background: var(--primary); }
        .avatar { width: 40px; height: 40px; border-radius: 10px; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MAIN */
        .main-container { flex: 1; display: flex; flex-direction: column; background: #fff; width: 100%; }
        .chat-header { height: 70px; padding: 0 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fdfdff; }
        
        /* MESSAGES */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #f1f5f9; color: #334155; border-bottom-left-radius: 4px; }
        .media-content { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        /* INPUT BAR */
        .input-bar { padding: 15px 20px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #f1f5f9; }
        .input-wrapper { flex: 1; background: #f1f5f9; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; border: none; background: none; padding: 10px; outline: none; }
        .btn-icon { color: var(--primary); cursor: pointer; font-size: 1.2rem; }
        .btn-send { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-weight:800; color:var(--primary); font-size:1.2rem;">CONNECT</div>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">✕</button>
        </div>
        <div style="padding: 0 20px;">
            <div style="display:flex; background:var(--glass); border-radius:10px; padding:5px;">
                <input type="text" id="user-search" placeholder="Search users..." style="background:none; border:none; color:white; padding:8px; flex:1; outline:none;">
                <button onclick="doSearch()" style="background:var(--primary); border:none; color:white; border-radius:8px; padding:5px 12px; cursor:pointer;">Find</button>
            </div>
            <div id="search-results"></div>
        </div>
        <div class="sidebar-scroll">
            <div class="section-label">Suggestions</div>
            <div id="suggestions-list"></div>
            <div class="section-label">Requests</div>
            <div id="requests-list"></div>
            <div class="section-label">Friends</div>
            <div id="friends-list"></div>
        </div>
        <div style="padding:20px; background:rgba(0,0,0,0.2)">
            <p style="font-size:0.7rem; margin-bottom:10px;">Logged as: <b id="my-name"></b></p>
            <button onclick="logout()" style="width:100%; padding:10px; background:#ef4444; border:none; color:white; border-radius:10px; cursor:pointer;">Sign Out</button>
        </div>
    </div>

    <div class="main-container">
        <div class="chat-header">
            <button onclick="toggleSidebar()" style="background:#f1f5f9; border:none; padding:10px; border-radius:10px; cursor:pointer;" class="mobile-only">☰</button>
            <div class="avatar" id="header-avatar">?</div>
            <div style="display:flex; flex-direction:column">
                <span id="chat-target" style="font-weight:700;">Select Chat</span>
                <span id="online-status" style="font-size:0.7rem; color:#22c55e; display:none;">• Online</span>
            </div>
        </div>
        <div id="chat-window"></div>
        <div class="input-bar">
            <div class="input-wrapper">
                <label class="btn-icon">
                    <i class="fa-solid fa-paperclip"></i>
                    <input type="file" id="file-input" style="display:none;" onchange="uploadFile(this)">
                </label>
                <input type="text" id="msg-input" placeholder="Aa" onkeypress="if(event.key==='Enter') send()">
            </div>
            <button class="btn-send" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script>
    const scriptURL = "REPLACE_WITH_YOUR_NEW_DEPLOY_URL";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 2000);
    }

    // SEARCH & SUGGESTIONS
    function doSearch() {
        const q = document.getElementById('user-search').value;
        if(!q) return;
        apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }
    window.renderSearch = (users) => {
        const res = document.getElementById('search-results');
        res.innerHTML = users.map(u => `<div style="display:flex; justify-content:space-between; padding:10px; font-size:0.8rem; color:white"><span>${u.name}</span><span style="color:var(--primary); cursor:pointer" onclick="addFriend('${u.name}')">Add</span></div>`).join('');
    };

    window.addFriend = (name) => apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "afterAction");
    window.acceptFriend = (name) => apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "afterAction");
    window.afterAction = () => { alert("Action Successful"); loadAll(); };

    function loadAll() {
        apiCall("action=getSuggestions", "renderSuggestions");
        apiCall("action=getFriends", "renderFriends");
        if(activeFriend) apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderSuggestions = (data) => {
        document.getElementById('suggestions-list').innerHTML = data.map(u => `<div class="chat-item" onclick="addFriend('${u.name}')"><div class="avatar">${u.name[0]}</div><span>${u.name}</span></div>`).join('');
    };

    window.renderFriends = (data) => {
        document.getElementById('requests-list').innerHTML = data.requests.map(r => `<div class="chat-item" style="border:1px solid var(--primary)"><div class="avatar">${r.name[0]}</div><span>${r.name}</span><button onclick="acceptFriend('${r.name}')" style="margin-left:auto; background:var(--primary); border:none; color:white; border-radius:5px; padding:4px 8px;">Accept</button></div>`).join('');
        document.getElementById('friends-list').innerHTML = data.friends.map(f => `<div class="chat-item ${activeFriend===f.name?'active':''}" onclick="openChat('${f.name}')"><div class="avatar">${f.name[0]}</div><span>${f.name}</span> ${f.online?'<div style="width:8px; height:8px; background:#22c55e; border-radius:50%; margin-left:auto"></div>':''}</div>`).join('');
    };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        document.getElementById('header-avatar').innerText = name[0];
        document.getElementById('online-status').style.display = 'block';
        if(window.innerWidth < 768) toggleSidebar();
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = (msgs) => {
        const win = document.getElementById('chat-window');
        win.innerHTML = msgs.map(m => {
            let text = m.text;
            if(text.match(/\.(jpg|jpeg|png|gif)$/i)) text = `<img src="${text}" class="media-content" onclick="window.open('${text}')">`;
            else if(text.includes("drive.google.com")) text = `<a href="${text}" target="_blank" style="color:inherit;">📎 View Attached File</a>`;
            return `<div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${text}</div>`;
        }).join('');
        win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value || !activeFriend) return;
        const text = input.value; input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        loadAll();
    }

    async function uploadFile(input) {
        const file = input.files[0]; if(!file || !activeFriend) return;
        const reader = new FileReader();
        document.getElementById('msg-input').placeholder = "Uploading...";
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams({ action:'uploadFile', me:myName, recipient:activeFriend, fileName:file.name, mimeType:file.type, fileData:base64 })
            });
            document.getElementById('msg-input').placeholder = "Aa";
            loadAll();
        };
        reader.readAsDataURL(file);
    }

    setInterval(loadAll, 5000);
    loadAll();
</script>
</body>
</html>
