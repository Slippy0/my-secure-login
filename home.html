<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --sidebar-bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f8fafc; display: flex; }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: -300px; height: 100%; width: 85%; } .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); } }
        
        .sidebar-header { padding: 25px; display: flex; align-items: center; justify-content: space-between; }
        .close-sidebar { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .close-sidebar { display: block; } }
        
        .search-area { padding: 0 20px 20px; }
        .search-wrapper { display: flex; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
        #user-search { flex: 1; background: none; border: none; color: #fff; padding: 10px; outline: none; font-size: 0.9rem; }
        .btn-find { background: var(--primary); border: none; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 15px; }
        .section-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        
        .item-row { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .chat-item.active { background: var(--primary); }
        .avatar { width: 40px; height: 40px; border-radius: 10px; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; width: 100%; }
        .chat-header { height: 65px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; gap: 12px; }
        .menu-btn { display: none; background: #f1f5f9; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }
        
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        
        .input-bar { padding: 15px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; align-items: center; }
        .input-wrapper { flex: 1; background: #f1f5f9; border-radius: 20px; padding: 2px 15px; }
        #msg-input { width: 100%; background: none; border: none; padding: 10px 0; outline: none; font-size: 1rem; }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span style="font-weight:800; color:var(--primary); font-size:1.1rem;">OJT CONNECT</span>
        <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="search-area">
        <div class="search-wrapper">
            <input type="text" id="user-search" placeholder="Find people...">
            <button class="btn-find" onclick="doSearch()">Find</button>
        </div>
        <div id="search-results" style="margin-top:10px;"></div>
    </div>
    <div class="sidebar-scroll">
        <div class="section-label">Suggestions</div>
        <div id="suggestions-list"></div>
        <div class="section-label">Requests</div>
        <div id="requests-list"></div>
        <div class="section-label">My Chats</div>
        <div id="friends-list"></div>
    </div>
    <div style="padding:20px; border-top:1px solid rgba(255,255,255,0.1);">
        <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:10px;">Logged as: <b id="my-name" style="color:white"></b></div>
        <button onclick="logout()" style="width:100%; padding:10px; border-radius:8px; border:none; background:#ef4444; color:white; font-weight:700; cursor:pointer;">LOGOUT</button>
    </div>
</div>

<div class="main-container">
    <div class="chat-header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="avatar" id="header-avatar" style="background:var(--primary)">?</div>
        <div style="font-weight:700;" id="chat-target">Select a friend</div>
    </div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImageUpload(this)">
        <button class="btn-round" style="background:#64748b" onclick="document.getElementById('file-input').click()">📎</button>
        <div class="input-wrapper"><input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') send()"></div>
        <button class="btn-round" onclick="send()">➤</button>
    </div>
</div>

<script>
    const scriptURL = "PASTE_YOUR_SCRIPT_URL_HERE";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem("username"); window.location.href = "index.html"; }

    function apiCall(params, callbackName) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callbackName}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 2000);
    }

    function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        if(q) apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = function(users) {
        document.getElementById('search-results').innerHTML = users.map(u => `<div class="item-row"><span>${u.name}</span><button onclick="addFriend('${u.name}')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer;">+ Add</button></div>`).join('');
    };

    window.addFriend = function(name) { apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "afterAction"); };
    window.acceptFriend = function(name) { apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "afterAction"); };
    window.afterAction = function() { loadAll(); document.getElementById('search-results').innerHTML = ""; };

    function loadAll() {
        apiCall(`action=getFriends`, "renderFriends");
        apiCall(`action=getSuggestions`, "renderSuggestions");
        if(activeFriend) loadMessages();
    }

    window.renderFriends = function(data) {
        document.getElementById('requests-list').innerHTML = data.requests.length ? data.requests.map(r => `<div class="item-row"><span>${r.name}</span><button onclick="acceptFriend('${r.name}')" style="background:#22c55e; border:none; color:white; padding:4px 8px; border-radius:5px; cursor:pointer;">Accept</button></div>`).join('') : '<div style="font-size:0.7rem; color:#475569; padding:5px;">None</div>';
        document.getElementById('friends-list').innerHTML = data.friends.map(f => `<div class="chat-item ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')"><div class="avatar" style="background:${stringToColor(f.name)}">${f.name[0].toUpperCase()}</div><span style="font-weight:600">${f.name}</span></div>`).join('');
    };

    window.renderSuggestions = function(data) {
        document.getElementById('suggestions-list').innerHTML = data.length ? data.slice(0, 3).map(u => `<div class="item-row"><span>${u.name}</span><button onclick="addFriend('${u.name}')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer;">Add</button></div>`).join('') : '<div style="font-size:0.7rem; color:#475569; padding:5px;">None</div>';
    };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        document.getElementById('header-avatar').innerText = name[0].toUpperCase();
        document.getElementById('header-avatar').style.background = stringToColor(name);
        if(window.innerWidth <= 768) toggleSidebar();
        loadMessages();
    }

    function loadMessages() { if(activeFriend) apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages"); }

    window.renderMessages = function(msgs) {
        document.getElementById('chat-window').innerHTML = msgs.map(m => {
            let content = m.text;
            if (content.startsWith('[IMG]')) {
                const url = content.replace('[IMG]', '');
                content = `<img src="${url}" style="max-width:100%; border-radius:10px; cursor:pointer" onclick="window.open('${url}')">`;
            }
            return `<div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${content}</div>`;
        }).join('');
        const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value; input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        loadMessages();
    }

    function handleImageUpload(input) {
        if (!input.files[0] || !activeFriend) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            apiCall(`action=uploadImage&mimeType=${input.files[0].type}&base64Data=${encodeURIComponent(base64)}`, "afterImageUpload");
        };
        reader.readAsDataURL(input.files[0]);
    }

    window.afterImageUpload = function(url) {
        const imgTag = `[IMG]${url}`;
        fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(imgTag)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 1000);
    };

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
        return "#" + "00000".substring(0, 6 - c.length) + c;
    }

    setInterval(loadAll, 5000);
    loadAll();
</script>
</body>
</html>
