<!DOCTYPE html>
<html>
<head>
    <title>OJT Portal</title>
    <style>
        :root { --nav: #0f172a; --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        .sidebar { width: 300px; background: var(--nav); color: white; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 20px; font-weight: 800; border-bottom: 1px solid #1e293b; color: #38bdf8; }
        
        .search-area { padding: 15px; border-bottom: 1px solid #1e293b; }
        #user-search { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px; border: none; background: #1e293b; color: white; outline: none; }
        
        #search-results { background: #1e293b; border-radius: 0 0 6px 6px; max-height: 120px; overflow-y: auto; }
        .search-item { padding: 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #0f172a; display: flex; justify-content: space-between; }
        .search-item:hover { background: var(--primary); }

        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: 0.2s; font-size: 14px; }
        .friend:hover { background: #1e293b; }
        .friend.active { background: var(--primary); }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #e2e8f0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; line-height: 1.4; position: relative; }
        .bubble::before { content: attr(data-user); display: block; font-size: 10px; margin-bottom: 4px; opacity: 0.7; font-weight: bold; }
        .me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; }

        .input-bar { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">OJT CONNECT v2.0</div>
    
    <div class="search-area">
        <input type="text" id="user-search" placeholder="Type username to find..." onkeyup="doSearch()">
        <div id="search-results"></div>
    </div>

    <div class="friends-list" id="friends-list">
        <p style="font-size: 11px; color: #64748b; margin-left: 10px; text-transform: uppercase; letter-spacing: 1px;">Direct Messages</p>
    </div>
    
    <div style="padding: 15px; font-size: 11px; border-top: 1px solid #1e293b; background: #0b1221;">
        Logged as: <b id="user-display" style="color: #38bdf8;"></b>
    </div>
</div>

<div class="chat-main">
    <div class="chat-header">
        <span id="chat-title">Select a friend to begin chatting</span>
        <span id="status-indicator" style="color:#22c55e; font-size:10px;">● SYSTEM LIVE</span>
    </div>
    <div id="chat-window">
        <div style="margin: auto; color: #94a3b8; text-align: center;">
            <p>Your private conversations will appear here.</p>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()">
        <button id="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    // Update this URL whenever you create a NEW DEPLOYMENT in Google Apps Script
    const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-display').innerText = myName;
    let activeFriend = null;

    async function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        const resultsDiv = document.getElementById('search-results');
        
        if(q.length < 1) { resultsDiv.innerHTML = ""; return; }
        
        try {
            const res = await fetch(`${scriptURL}?action=searchUsers&me=${myName}&query=${encodeURIComponent(q)}`);
            const users = await res.json();
            
            if(users.length === 0) {
                resultsDiv.innerHTML = `<div class="search-item" style="cursor:default;">No users found</div>`;
                return;
            }

            resultsDiv.innerHTML = users.map(u => `
                <div class="search-item" onclick="addFriend('${u}')">
                    <span>${u}</span> <span style="color:#38bdf8; font-weight:bold;">+ Add</span>
                </div>
            `).join('');
        } catch (err) {
            console.error("Search error:", err);
        }
    }

    async function addFriend(name) {
        // Clear UI first for speed
        document.getElementById('user-search').value = "";
        document.getElementById('search-results').innerHTML = "";
        
        try {
            // Using mode: 'no-cors' for fire-and-forget actions like adding friends
            await fetch(`${scriptURL}?action=addFriend&me=${myName}&friend=${name}`, {mode:'no-cors'});
            // Small delay to allow Google Sheets to process
            setTimeout(loadFriends, 1000);
        } catch (err) {
            console.error("Add friend error:", err);
        }
    }

    async function loadFriends() {
        try {
            const res = await fetch(`${scriptURL}?action=getFriends&me=${myName}`);
            const friends = await res.json();
            const listHeader = `<p style="font-size: 11px; color: #64748b; margin-left: 10px; text-transform: uppercase; letter-spacing: 1px;">Direct Messages</p>`;
            
            document.getElementById('friends-list').innerHTML = listHeader + 
                friends.map(f => `
                <div class="friend ${activeFriend === f ? 'active' : ''}" onclick="openChat('${f}')">
                    ● ${f}
                </div>
            `).join('');
        } catch (err) {
            console.error("Load friends error:", err);
        }
    }

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-title').innerText = "Chatting with " + name;
        document.getElementById('msg-input').focus();
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        try {
            const res = await fetch(`${scriptURL}?action=getMessages&me=${myName}&friend=${activeFriend}`);
            const data = await res.json();
            
            const chatWindow = document.getElementById('chat-window');
            if (data.length === 0) {
                chatWindow.innerHTML = `<div style="margin: auto; color: #94a3b8; text-align: center;">No messages yet. Say hi!</div>`;
            } else {
                chatWindow.innerHTML = data.map(m => `
                    <div class="bubble ${m.user === myName ? 'me' : 'other'}" data-user="${m.user}">
                        ${m.text}
                    </div>
                `).join('');
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (err) {
            console.error("Load messages error:", err);
        }
    }

    async function send() {
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        const text = input.value.trim();
        
        if(!text || !activeFriend) return;
        
        // Disable UI during send
        input.value = "";
        input.disabled = true;
        btn.disabled = true;

        try {
            await fetch(`${scriptURL}?action=sendMessage&username=${myName}&recipient=${activeFriend}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
            // Refresh messages after a short delay
            setTimeout(() => {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
                loadMessages();
            }, 600);
        } catch (err) {
            console.error("Send error:", err);
            input.disabled = false;
            btn.disabled = false;
        }
    }

    // Auto-refresh every 5 seconds
    setInterval(() => { 
        loadFriends(); 
        if(activeFriend) loadMessages(); 
    }, 5000);

    // Initial load
    loadFriends();
</script>
</body>
</html>
