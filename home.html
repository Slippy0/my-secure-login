<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Dashboard - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877f2; --success: #42b72a; --bg: #f0f2f5; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Message POV Styling */
        #chat-window { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; border: 1px solid #dddfe2; border-radius: 8px; background: #f9f9f9; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; line-height: 1.4; position: relative; }
        
        /* Your messages (Right Side) */
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        /* Others messages (Left Side) */
        .msg-them { align-self: flex-start; background: #e4e6eb; color: #1c1e21; border-bottom-left-radius: 4px; }
        
        .user-label { font-size: 11px; font-weight: bold; margin-bottom: 3px; display: block; }
        .msg-me .user-label { color: #d0e3ff; text-align: right; }
        .msg-them .user-label { color: var(--primary); }

        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #dddfe2; border-radius: 25px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <span style="font-weight: bold;"><i class="fa-solid fa-chart-line"></i> Dashboard</span>
        <a href="index.html" style="color: white; text-decoration: none; font-size: 13px;">Log Out</a>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin:0;">Hello, <span id="user-name">...</span>!</h2>
            <div style="font-size: 13px; color: var(--primary); margin-top: 5px;">
                <i class="fa-solid fa-circle" style="color:var(--success); font-size:8px;"></i> Online: <span id="online-list">...</span>
            </div>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-comments"></i> Live Conversation</h3>
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
        
        // Get the username saved during login
        const myName = localStorage.getItem("username") || "Guest";
        document.getElementById('user-name').innerText = myName;

        async function updateChat() {
            try {
                // Get Online Users
                const uRes = await fetch(`${scriptURL}?action=getOnlineUsers`);
                const users = await uRes.json();
                document.getElementById('online-list').innerText = users.join(', ');

                // Get Messages
                const mRes = await fetch(`${scriptURL}?action=getMessages`);
                const msgs = await mRes.json();
                const window = document.getElementById('chat-window');
                
                window.innerHTML = msgs.map(m => {
                    // Check if the message is from YOU or SOMEONE ELSE
                    const isMe = m.user === myName;
                    return `
                        <div class="msg ${isMe ? 'msg-me' : 'msg-them'}">
                            <span class="user-label">${isMe ? 'You' : m.user}</span>
                            ${m.text}
                        </div>
                    `;
                }).join('');
                window.scrollTop = window.scrollHeight;
            } catch(e) { console.error("Refresh failed"); }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            const text = encodeURIComponent(input.value);
            input.value = "";
            // Temporarily show message locally for speed
            await fetch(`${scriptURL}?action=sendMessage&username=${myName}&text=${text}`);
            updateChat();
        }

        setInterval(updateChat, 4000);
        updateChat();
    </script>
</body>
</html>
