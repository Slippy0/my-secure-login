<!DOCTYPE html>
<html>
<head>
    <title>OJT Portal</title>
    <style>
        :root { --nav: #0f172a; --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--nav); color: white; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 20px; font-weight: 800; border-bottom: 1px solid #1e293b; color: #38bdf8; }
        
        .search-area { padding: 15px; border-bottom: 1px solid #1e293b; }
        .search-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #user-search { flex: 1; padding: 10px; border-radius: 6px; border: none; background: #1e293b; color: white; outline: none; }
        .btn-search { background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; padding: 0 10px; cursor: pointer; font-weight: bold; }
        
        #search-results { background: #1e293b; border-radius: 0 0 6px 6px; max-height: 150px; overflow-y: auto; }
        .search-item { padding: 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #0f172a; display: flex; justify-content: space-between; align-items: center; }
        .search-item:hover { background: var(--primary); }

        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: 0.2s; font-size: 14px; }
        .friend:hover { background: #1e293b; }
        .friend.active { background: var(--primary); color: white; }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #e2e8f0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; line-height: 1.4; }
        .me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; }

        .input-bar { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">OJT CONNECT v2.0</div>
    
    <div class="search-area">
        <div class="search-row">
            <input type="text" id="user-search" placeholder="Find users..." onkeypress="if(event.key==='Enter') doSearch()">
            <button class="btn-search" onclick="doSearch()">Find</button>
        </div>
        <div id="search-results"></div>
    </div>

    <div class="friends-list" id="friends-list">
        <p style="font-size: 11px; color: #64748b; margin-left: 10px;">DIRECT MESSAGES</p>
    </div>
    
    <div style="padding: 15px; font-size: 11px; border-top: 1px solid #1e293b;">Logged as: <b id="user-display"></b></div>
</div>

<div class="chat-main">
    <div class="chat-header">
        <span id="chat-title">Select a friend to begin chatting</span>
        <span style="color:#22c55e; font-size:10px;">● SYSTEM LIVE</span>
    </div>
    <div id="chat-window">
        <div style="margin:auto; color:#94a3b8; text-align:center;">Your conversations will appear here</div>
    </div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn-send" onclick="send()">Send</button>
    </div>
</div>

<script>
    // Replace with your current Google Apps Script Web App URL
    const scriptURL = "PASTE_YOUR_NEW_URL_HERE";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-display').innerText = myName;
    let activeFriend = null;

    async function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        const resultsBox = document.getElementById('search-results');
        if(q.length < 1) { resultsBox.innerHTML = ""; return; }
        
        resultsBox.innerHTML = "<div class='search-item'>Searching...</div>";
        try {
            const res = await fetch(`${scriptURL}?action=searchUsers&me=${encodeURIComponent(myName)}&query=${encodeURIComponent(q)}`);
            const users = await res.json();
            
            if(users.length === 0) {
                resultsBox.innerHTML = "<div class='search-item'>No users found</div>";
                return;
            }

            resultsBox.innerHTML = users.map(u => `
                <div class="search-item" onclick="addFriend('${u}')">
                    <span>${u}</span> <span style="color:#38bdf8;">+ Add</span>
                </div>
            `).join('');
        } catch(e) {
            resultsBox.innerHTML = "<div class='search-item' style='color:red;'>Connection Blocked. Click 'Dangerous' Badge.</div>";
        }
    }

    async function addFriend(name) {
        document.getElementById('user-search').value = "";
        document.getElementById('search-results').innerHTML = "";
        await fetch(`${scriptURL}?action=addFriend&me=${encodeURIComponent(myName)}&friend=${encodeURIComponent(name)}`, {mode:'no-cors'});
        setTimeout(loadFriends, 1000);
    }

    async function loadFriends() {
        try {
            const res = await fetch(`${scriptURL}?action=getFriends&me=${encodeURIComponent(myName)}`);
            const friends = await res.json();
            document.getElementById('friends-list').innerHTML = `<p style="font-size: 11px; color: #64748b; margin-left: 10px;">DIRECT MESSAGES</p>` + 
                friends.map(f => `
                <div class="friend ${activeFriend === f ? 'active' : ''}" onclick="openChat('${f}')">● ${f}</div>
            `).join('');
        } catch(e) {}
    }

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-title').innerText = "Chat with " + name;
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        try {
            const res = await fetch(`${scriptURL}?action=getMessages&me=${encodeURIComponent(myName)}&friend=${encodeURIComponent(activeFriend)}`);
            const data = await res.json();
            document.getElementById('chat-window').innerHTML = data.map(m => `
                <div class="bubble ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'other'}">${m.text}</div>
            `).join('');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !activeFriend) return;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { loadFriends(); if(activeFriend) loadMessages(); }, 5000);
    loadFriends();
</script>
</body>
</html>
