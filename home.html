<!DOCTYPE html>
<html>
<head>
    <title>OJT Portal | Messaging</title>
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #1e293b; }
        .search-container { padding: 15px; border-bottom: 1px solid #1e293b; }
        #user-search { width: 90%; padding: 10px; border-radius: 8px; border: none; background: #1e293b; color: white; outline: none; }
        
        .results-popup { background: #1e293b; border-radius: 8px; margin-top: 5px; max-height: 150px; overflow-y: auto; }
        .result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #0f172a; font-size: 13px; display: flex; justify-content: space-between; }
        .result-item:hover { background: var(--primary); }

        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-btn { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .friend-btn:hover { background: #1e293b; }
        .friend-btn.active { background: var(--primary); }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 20px; border-bottom: 1px solid #e2e8f0; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        
        /* Bubbles */
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 70%; font-size: 14px; }
        .me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; }
        button#send-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; font-size:18px;">OJT CONNECT</h2>
    </div>
    
    <div class="search-container">
        <input type="text" id="user-search" placeholder="🔍 Search Users..." onkeyup="searchUsers()">
        <div id="search-results" class="results-popup"></div>
    </div>

    <div class="friends-list" id="friends-list">
        <p style="font-size:11px; color:#64748b; margin-left:10px;">MY FRIENDS</p>
    </div>
    
    <div style="padding:15px; font-size:12px; border-top:1px solid #1e293b;">
        Logged as: <b id="my-name"></b>
    </div>
</div>

<div class="main">
    <div class="chat-header">
        <span id="chat-title">Select a friend to message</span>
        <span id="conn-status" style="font-size:11px; color:#22c55e;">● SYSTEM LIVE</span>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        <button id="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    // --- Search Logic ---
    async function searchUsers() {
        const query = document.getElementById('user-search').value;
        if (query.length < 1) { document.getElementById('search-results').innerHTML = ""; return; }
        
        const res = await fetch(`${scriptURL}?action=searchUsers&me=${myName}&query=${query}`);
        const users = await res.json();
        
        document.getElementById('search-results').innerHTML = users.map(u => `
            <div class="result-item" onclick="addFriend('${u}')">
                <span>${u}</span> <span style="font-size:9px; color:#2563eb;">+ ADD</span>
            </div>
        `).join('');
    }

    async function addFriend(name) {
        await fetch(`${scriptURL}?action=addFriend&me=${myName}&friend=${name}`, {mode:'no-cors'});
        document.getElementById('user-search').value = "";
        document.getElementById('search-results').innerHTML = "";
        loadFriends();
    }

    // --- Chat Logic ---
    async function loadFriends() {
        try {
            const res = await fetch(`${scriptURL}?action=getFriends&me=${myName}`);
            const friends = await res.json();
            document.getElementById('friends-list').innerHTML = `<p style="font-size:11px; color:#64748b; margin-left:10px;">MY FRIENDS</p>` + 
                friends.map(f => `
                <div class="friend-btn ${activeFriend === f ? 'active' : ''}" onclick="selectFriend('${f}')">
                    <div style="width:8px; height:8px; background:#22c55e; border-radius:50%;"></div> ${f}
                </div>
            `).join('');
        } catch(e) {}
    }

    function selectFriend(name) {
        activeFriend = name;
        document.getElementById('chat-title').innerText = `Chatting with ${name}`;
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        try {
            const res = await fetch(`${scriptURL}?action=getMessages&me=${myName}&friend=${activeFriend}`);
            const data = await res.json();
            const win = document.getElementById('chat-window');
            win.innerHTML = data.map(m => `
                <div class="bubble ${m.user === myName ? 'me' : 'other'}">${m.text}</div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim() || !activeFriend) return;
        const msg = input.value;
        input.value = "";
        
        await fetch(`${scriptURL}?action=sendMessage&username=${myName}&recipient=${activeFriend}&text=${encodeURIComponent(msg)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 600);
    }

    setInterval(() => { loadFriends(); loadMessages(); }, 5000);
    loadFriends();
</script>

</body>
</html>
