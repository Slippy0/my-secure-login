<script>
    const scriptURL = "YOUR_NEW_DEPLOYMENT_URL_HERE";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-name').innerText = myName;

    // Helper to turn Google Drive links into direct images
    function getImg(url) {
        if (url.includes("drive.google.com")) {
            const id = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        }
        return url;
    }

    async function updateChat() {
        try {
            const [uRes, mRes] = await Promise.all([
                fetch(`${scriptURL}?action=getOnlineUsers`),
                fetch(`${scriptURL}?action=getMessages`)
            ]);
            const users = await uRes.json();
            const msgs = await mRes.json();
            
            document.getElementById('online-list').innerText = users.join(', ');
            
            const chatBox = document.getElementById('chat-window');
            chatBox.innerHTML = msgs.map(m => {
                const isMe = m.user === myName;
                let content = m.text;
                
                if (m.text.includes("drive.google.com")) {
                    content = `<img src="${getImg(m.text)}" class="chat-img" onclick="window.open('${m.text}')" 
                               onerror="this.outerHTML='<a href=\'${m.text}\' target=\'_blank\'>View Attachment</a>'">`;
                }

                return `<div class="msg-wrapper ${isMe?'my-msg-wrapper':'other-msg-wrapper'}">
                    <span class="user-label">${isMe?'You':m.user}</span>
                    <div class="msg ${isMe?'my-msg':'other-msg'}">${content}</div>
                </div>`;
            }).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) { console.log("Refresh failed"); }
    }

    async function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;
        
        const chatInput = document.getElementById('chat-input');
        chatInput.disabled = true;
        chatInput.placeholder = "Uploading " + file.name + "...";

        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            const payload = {
                action: 'uploadFile',
                username: myName,
                fileName: file.name,
                mimeType: file.type,
                fileData: base64
            };

            try {
                // Send as POST JSON
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // Critical for GitHub Pages to Apps Script
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                chatInput.disabled = false;
                chatInput.placeholder = "Sent! Refreshing...";
                setTimeout(() => {
                    chatInput.placeholder = "Type a message...";
                    updateChat();
                }, 2500);
            } catch (err) {
                alert("Upload failed. Check console.");
                chatInput.disabled = false;
            }
        };
        reader.readAsDataURL(file);
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim() || input.disabled) return;
        const text = input.value;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(updateChat, 1000);
    }

    setInterval(updateChat, 5000);
    updateChat();
</script>
