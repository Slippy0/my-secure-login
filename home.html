<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Portal</title>
    <style>
        :root { --primary: #6366f1; --sidebar-bg: #111827; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f3f4f6; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        .section-title { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; margin: 15px 0 5px; }
        .item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .friend-link { cursor: pointer; padding: 10px; border-radius: 8px; display: block; color: white; text-decoration: none; }
        .friend-link:hover, .friend-link.active { background: var(--primary); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; background: #f9fafb; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 0.9rem; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #e5e7eb; color: black; }
        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--primary)">OJT CONNECT</h3>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <input type="text" id="user-search" placeholder="Search..." style="background:#1f2937; border:none; color:white;">
        <button onclick="doSearch()">Find</button>
    </div>
    <div id="search-results"></div>

    <div class="section-title">Suggestions</div>
    <div id="suggestions-list"></div>

    <div class="section-title">Requests</div>
    <div id="requests-list"></div>

    <div class="section-title">Messages</div>
    <div id="friends-list"></div>

    <div style="margin-top:auto; padding-top:10px; border-top:1px solid #374151;">
        <div style="font-size:0.8rem">User: <b id="display-name"></b></div>
        <button onclick="logout()" style="background:#ef4444; width:100%; margin-top:5px;">Logout</button>
    </div>
</div>

<div class="main">
    <div style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;" id="chat-target">Select a friend</div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('display-name').innerText = myName;
    let activeFriend = null;

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 1500);
    }

    function doSearch() {
        const q = document.getElementById('user-search').value;
        apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = (d) => {
        document.getElementById('search-results').innerHTML = d.map(u => `<div class="item"><span>${u.name}</span><button onclick="addFriend('${u.name}')">Add</button></div>`).join('');
    };

    window.addFriend = (n) => apiCall(`action=addFriend&friend=${encodeURIComponent(n)}`, "loadAll");
    window.acceptFriend = (n) => apiCall(`action=acceptFriend&friend=${encodeURIComponent(n)}`, "loadAll");

    function loadAll() {
        apiCall(`action=getFriends`, "renderFriends");
        apiCall(`action=getSuggestions`, "renderSuggestions");
        if(activeFriend) loadMessages();
    }

    window.renderFriends = (data) => {
        const d = typeof data === 'string' ? JSON.parse(data) : data;
        document.getElementById('requests-list').innerHTML = d.requests.map(r => `<div class="item"><span>${r.name}</span><button onclick="acceptFriend('${r.name}')">Accept</button></div>`).join('');
        document.getElementById('friends-list').innerHTML = d.friends.map(f => `<div class="friend-link ${activeFriend===f.name?'active':''}" onclick="openChat('${f.name}')">${f.name}</div>`).join('');
    };

    window.renderSuggestions = (data) => {
        const d = typeof data === 'string' ? JSON.parse(data) : data;
        document.getElementById('suggestions-list').innerHTML = d.map(u => `<div class="item"><span>${u.name}</span><button onclick="addFriend('${u.name}')">Add</button></div>`).join('');
    };

    function openChat(n) {
        activeFriend = n;
        document.getElementById('chat-target').innerText = n;
        loadMessages();
    }

    function loadMessages() {
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = (msgs) => {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `<div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>`).join('');
        const w = document.getElementById('chat-window'); w.scrollTop = w.scrollHeight;
    };

    async function send() {
        const i = document.getElementById('msg-input');
        if(!i.value || !activeFriend) return;
        const txt = i.value; i.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(txt)}`, {mode:'no-cors'});
        loadMessages();
    }

    function logout() { localStorage.removeItem("username"); window.location.href="index.html"; }

    setInterval(loadAll, 5000);
    loadAll();
</script>

</body>
</html>
