<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OJT | Connect</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--light); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: 800; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-card { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .friend-card:hover { background: #1e293b; }
        .friend-card.active { background: var(--primary); }
        .status-online { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 18px 25px; border-bottom: 1px solid #e2e8f0; font-weight: 600; display: flex; justify-content: space-between; }
        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #f1f5f9; color: var(--dark); border-bottom-left-radius: 2px; }

        /* Input Area */
        .input-box { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; }

        /* Search Suggestion Section */
        #search-area { padding: 10px; background: #1e293b; display: none; }
        .suggest-item { padding: 8px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #334155; }
        .suggest-item:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <span>OJT CONNECT</span>
        <button onclick="toggleSearch()" style="background:none; border:1px solid #334155; font-size:10px; padding:2px 5px;">+ Find</button>
    </div>
    
    <div id="search-area">
        <input type="text" id="user-query" placeholder="Search user..." onkeyup="searchUsers()" style="width:90%; font-size:12px; margin-bottom:5px;">
        <div id="search-results"></div>
    </div>

    <div class="friends-list" id="friends-list">
        <p style="font-size:11px; opacity:0.5; margin-left:10px;">DIRECT MESSAGES</p>
        </div>
    
    <div style="padding:20px; font-size:12px; border-top:1px solid #1e293b;">
        Logged as: <b id="my-name"></b>
    </div>
</div>

<div class="main">
    <div class="chat-header">
        <span id="chat-title">Select a friend to begin</span>
        <span id="conn-status" style="font-size:10px; color:#22c55e;">● SYSTEM LIVE</span>
    </div>
    <div id="chat-window"></div>
    <div class="input-box">
        <input type="text" id="chat-input" placeholder="Write a message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSearch() {
        const area = document.getElementById('search-area');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
        if(area.style.display === 'block') searchUsers();
    }

    async function searchUsers() {
        const query = document.getElementById('user-query').value;
        const res = await fetch(`${scriptURL}?action=searchUsers&me=${myName}&query=${query}`);
        const users = await res.json();
        document.getElementById('search-results').innerHTML = users.map(u => 
            `<div class="suggest-item" onclick="addFriend('${u}')">+ Add ${u}</div>`
        ).join('');
    }

    async function addFriend(name) {
        await fetch(`${scriptURL}?action=addFriend&me=${myName}&friend=${name}`, {mode:'no-cors'});
        toggleSearch();
        loadFriends();
    }

    async function loadFriends() {
        try {
            const res = await fetch(`${scriptURL}?action=getFriends&me=${myName}`);
            const friends = await res.json();
            document.getElementById('friends-list').innerHTML = friends.map(f => `
                <div class="friend-card ${activeFriend === f ? 'active' : ''}" onclick="selectFriend('${f}')">
                    <div class="status-online"></div> ${f}
                </div>
            `).join('');
        } catch(e) {}
    }

    function selectFriend(name) {
        activeFriend = name;
        document.getElementById('chat-title').innerText = `Chatting with ${name}`;
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        try {
            const res = await fetch(`${scriptURL}?action=getMessages&me=${myName}&friend=${activeFriend}`);
            const msgs = await res.json();
            document.getElementById('chat-window').innerHTML = msgs.map(m => `
                <div class="msg ${m.user === myName ? 'me' : 'other'}">${m.text}</div>
            `).join('');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value;
        input.value = "";
        
        await fetch(`${scriptURL}?action=sendMessage&username=${myName}&recipient=${activeFriend}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { loadFriends(); loadMessages(); }, 5000);
    loadFriends();
</script>

</body>
</html>
