<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Portal | Fast</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(255,255,255,0.05); }
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, system-ui, sans-serif; background: #f8fafc; overflow: hidden; }
        .sidebar { width: 300px; background: var(--bg); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .main { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }
        .loader { position: absolute; top: 15px; right: 15px; font-size: 11px; color: #94a3b8; display: none; }
        .section-label { font-size: 11px; color: #64748b; text-transform: uppercase; margin: 25px 0 10px; font-weight: 800; letter-spacing: 0.5px; }
        .item-row { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .friend-btn { width: 100%; text-align: left; background: none; border: none; color: #cbd5e1; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .friend-btn.active { background: var(--primary); color: white; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; background: #f1f5f9; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .input-bar { padding: 15px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; background: white; }
        #msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #e2e8f0; outline: none; background: #f8fafc; font-size: 15px; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0 0 5px; font-size: 22px;">OJT CONNECT</h2>
    <div id="user-info" style="font-size: 12px; color: #64748b;"></div>

    <div class="section-label">Suggestions</div>
    <div id="suggestions-list"></div>

    <div class="section-label">Pending Requests</div>
    <div id="requests-list"></div>

    <div class="section-label">My Chats</div>
    <div id="friends-list"></div>

    <button onclick="logout()" style="margin-top:auto; background:#ef4444; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:700;">LOGOUT</button>
</div>

<div class="main">
    <div class="loader" id="sync-loader">Syncing...</div>
    <div style="padding:15px 25px; border-bottom:1px solid #e2e8f0; font-weight:700; color:#1e293b;" id="chat-header">Select a friend</div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-info').innerText = "Logged as: " + myName;
    let activeFriend = null;

    // --- CACHE LOAD ---
    const cachedData = localStorage.getItem('ojt_cache');
    if(cachedData) renderAll(JSON.parse(cachedData));

    function apiCall(params, callback) {
        document.getElementById('sync-loader').style.display = 'block';
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { 
            if(script.parentNode) document.body.removeChild(script);
            document.getElementById('sync-loader').style.display = 'none';
        }, 3000);
    }

    function loadData() {
        apiCall(`action=initLoad`, "renderAll");
        if(activeFriend) loadMessages();
    }

    window.renderAll = (data) => {
        localStorage.setItem('ojt_cache', JSON.stringify(data));
        
        // Render Suggestions
        document.getElementById('suggestions-list').innerHTML = data.suggestions.map(u => `
            <div class="item-row"><span>${u.name}</span><button onclick="addFriend('${u.name}')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer;">Add</button></div>
        `).join('') || '<div style="font-size:11px; color:#475569;">None</div>';

        // Render Requests
        document.getElementById('requests-list').innerHTML = data.requests.map(r => `
            <div class="item-row"><span>${r.name}</span><button onclick="acceptFriend('${r.name}')" style="background:#22c55e; border:none; color:white; padding:3px 8px; border-radius:4px; cursor:pointer;">Accept</button></div>
        `).join('') || '<div style="font-size:11px; color:#475569;">No pending requests</div>';

        // Render Friends
        document.getElementById('friends-list').innerHTML = data.friends.map(f => `
            <button class="friend-btn ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')">● ${f.name}</button>
        `).join('') || '<div style="font-size:11px; color:#475569;">No friends yet</div>';
    };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-header').innerText = name;
        loadMessages();
    }

    function loadMessages() {
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = (msgs) => {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value;
        input.value = "";
        
        // Optimistic UI update
        document.getElementById('chat-window').innerHTML += `<div class="msg me">${text}</div>`;
        const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;

        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
    }

    window.addFriend = (n) => apiCall(`action=addFriend&friend=${encodeURIComponent(n)}`, "loadData");
    window.acceptFriend = (n) => apiCall(`action=acceptFriend&friend=${encodeURIComponent(n)}`, "loadData");
    function logout() { localStorage.removeItem("username"); window.location.href="index.html"; }

    setInterval(loadData, 10000); // Check for new data every 10 seconds
    loadData();
</script>
</body>
</html>
