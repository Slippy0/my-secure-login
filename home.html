<script>
    const scriptURL = "PASTE_YOUR_NEW_DEPLOY_URL_HERE";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('user-name').innerText = myName;

    async function updateChat() {
        try {
            // Get Online Users
            const uRes = await fetch(`${scriptURL}?action=getOnlineUsers`);
            const users = await uRes.json();
            document.getElementById('online-list').innerText = users.join(', ');

            // Get Messages
            const mRes = await fetch(`${scriptURL}?action=getMessages`);
            const msgs = await mRes.json();
            const chatWindow = document.getElementById('chat-window');
            
            chatWindow.innerHTML = msgs.map(m => {
                const isMe = (m.user === myName);
                let content = m.text;

                if (m.text.includes("drive.google.com") || m.text.includes("http")) {
                    content = `<a href="${m.text}" target="_blank" style="color:inherit; text-decoration:underline;">View Attachment/Link</a>`;
                }

                return `
                    <div class="msg-wrapper ${isMe ? 'my-msg-wrapper' : 'other-msg-wrapper'}">
                        <span class="${isMe ? 'my-label' : 'other-label'}">${isMe ? 'You' : m.user}</span>
                        <div class="msg ${isMe ? 'my-msg' : 'other-msg'}">${content}</div>
                    </div>`;
            }).join('');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch(e) { console.log("Refresh failed - check scriptURL"); }
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        const text = input.value;
        input.value = "";
        
        // Send as GET to bypass CORS issues
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&text=${encodeURIComponent(text)}`, {
            method: 'GET',
            mode: 'no-cors'
        });
        setTimeout(updateChat, 1000);
    }

    async function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        document.getElementById('chat-input').placeholder = "Uploading...";
        
        reader.onload = async function() {
            const base64 = reader.result.split(',')[1];
            const payload = {
                action: 'uploadFile',
                username: myName,
                fileName: file.name,
                mimeType: file.type,
                fileData: base64
            };
            
            await fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify(payload) 
            });
            document.getElementById('chat-input').placeholder = "Type a message...";
            setTimeout(updateChat, 2000);
        };
        reader.readAsDataURL(file);
    }

    setInterval(updateChat, 5000);
    updateChat();
</script>
