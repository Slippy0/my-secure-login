<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Dashboard - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Chat UI Fix */
        #chat-window { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 15px; border: 1px solid #dddfe2; border-radius: 8px; background: #f9f9f9; }
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        
        /* ALIGNMENT: YOU (Right) */
        .my-msg-wrapper { align-items: flex-end; }
        .my-msg { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .my-label { color: var(--primary); font-weight: bold; font-size: 11px; margin-bottom: 2px; }

        /* ALIGNMENT: OTHERS (Left) */
        .other-msg-wrapper { align-items: flex-start; }
        .other-msg { background: #e4e6eb; color: #1c1e21; border-bottom-left-radius: 4px; }
        .other-label { color: #65676b; font-weight: bold; font-size: 11px; margin-bottom: 2px; }

        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #dddfe2; border-radius: 25px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <span style="font-weight: bold;">OJT Dashboard</span>
        <a href="index.html" onclick="localStorage.clear()" style="color: white; text-decoration: none; font-size: 13px;">Log Out</a>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin:0;">Hello, <span id="user-name">...</span>!</h2>
            <p style="font-size: 13px; color: #42b72a; margin-top: 5px;"><i class="fa-solid fa-circle" style="font-size:8px;"></i> Online: <span id="online-list">...</span></p>
        </div>
        <div class="card">
            <h3>Live Conversation</h3>
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
        
        // FIX: Pull the name saved in index.html
        const myName = localStorage.getItem("username") || "Guest";
        document.getElementById('user-name').innerText = myName;

        async function updateData() {
            try {
                // Update Online Users
                const uRes = await fetch(`${scriptURL}?action=getOnlineUsers`);
                const users = await uRes.json();
                document.getElementById('online-list').innerText = users.join(', ');

                // Update Chat
                const mRes = await fetch(`${scriptURL}?action=getMessages`);
                const msgs = await mRes.json();
                const window = document.getElementById('chat-window');
                
                window.innerHTML = msgs.map(m => {
                    const isMe = (m.user === myName);
                    return `
                        <div class="msg-wrapper ${isMe ? 'my-msg-wrapper' : 'other-msg-wrapper'}">
                            <span class="${isMe ? 'my-label' : 'other-label'}">${isMe ? 'You' : m.user}</span>
                            <div class="msg ${isMe ? 'my-msg' : 'other-msg'}">${m.text}</div>
                        </div>
                    `;
                }).join('');
                window.scrollTop = window.scrollHeight;
            } catch(e) { console.error("Update failed"); }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            const text = encodeURIComponent(input.value);
            input.value = "";
            await fetch(`${scriptURL}?action=sendMessage&username=${myName}&text=${text}`);
            updateData();
        }

        setInterval(updateData, 4000);
        updateData();
    </script>
</body>
</html>
