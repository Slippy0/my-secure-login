<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal | Messaging</title>
    <style>
        :root { 
            --sidebar-bg: #1e293b; 
            --sidebar-hover: #334155;
            --primary: #3b82f6; 
            --primary-hover: #2563eb;
            --bg: #f8fafc; 
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: var(--text-main);
        }
        
        body { display: flex; background: var(--bg); }

        /* --- SIDEBAR UI --- */
        .sidebar { 
            width: 300px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; padding: 0; transition: 0.3s ease; z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -300px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        }

        .sidebar-header { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); letter-spacing: -0.5px; }

        .search-container { padding: 15px 20px; }
        .search-box { display: flex; background: #334155; border-radius: 12px; padding: 5px 10px; align-items: center; }
        #user-search { 
            flex: 1; padding: 8px; border: none; background: transparent; 
            color: white; outline: none; font-size: 0.9rem; 
        }
        .btn-find { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .section-title { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }

        /* --- ITEM STYLES --- */
        .friend-item { 
            padding: 12px; border-radius: 12px; cursor: pointer; display: flex; 
            align-items: center; gap: 12px; margin-bottom: 4px; transition: 0.2s;
        }
        .friend-item:hover { background: var(--sidebar-hover); }
        .friend-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #475569; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; position: relative; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; border: 2px solid var(--sidebar-bg); position: absolute; bottom: 0; right: 0; }

        /* Suggestion Cards */
        .suggest-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
        }
        .btn-add { color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.85rem; padding: 5px 10px; border-radius: 6px; }
        .btn-add:hover { background: rgba(59, 130, 246, 0.1); }

        /* --- MAIN CHAT UI --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--white); height: 100%; position: relative; }

        .chat-header { 
            height: 70px; padding: 0 25px; border-bottom: 1px solid #f1f5f9; 
            display: flex; align-items: center; gap: 15px; background: var(--white);
        }
        .menu-toggle { display: none; background: #f1f5f9; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8fafc; }

        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 0.95rem; line-height: 1.5; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: white; color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }

        .input-area { 
            padding: 15px 25px; border-top: 1px solid #f1f5f9; 
            display: flex; gap: 12px; background: white; align-items: center;
        }
        #msg-input { 
            flex: 1; padding: 14px 20px; border: 1px solid #e2e8f0; 
            border-radius: 14px; outline: none; font-size: 1rem; transition: 0.2s;
            background: #f8fafc;
        }
        #msg-input:focus { border-color: var(--primary); background: white; }
        .btn-send { background: var(--primary); color: white; border: none; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-send:hover { background: var(--primary-hover); transform: scale(1.05); }

        .logout-container { padding: 20px; border-top: 1px solid #334151; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">CONNECT</span>
            <button class="close-btn" onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">×</button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="user-search" placeholder="Find people..." onkeypress="if(event.key==='Enter') doSearch()">
                <button class="btn-find" onclick="doSearch()">Find</button>
            </div>
            <div id="search-results" style="margin-top:10px;"></div>
        </div>
        
        <div class="sidebar-content">
            <div class="section-title">Suggestions</div>
            <div id="suggestions-list"></div>

            <div class="section-title">Pending</div>
            <div id="requests-list"></div>

            <div class="section-title">Messages</div>
            <div id="friends-list"></div>
        </div>

        <div class="logout-container">
            <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px;">Active: <b id="my-name" style="color:white"></b></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="avatar" style="background: var(--primary); color: white;" id="header-avatar">?</div>
            <div style="display:flex; flex-direction:column">
                <span id="chat-target" style="font-size: 1.1rem;">Select a friend</span>
                <span style="font-size: 0.75rem; color: #22c55e;">Online Now</span>
            </div>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type something..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem("username"); window.location.href = "index.html"; }

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}&t=${Date.now()}`;
        document.body.appendChild(script);
        setTimeout(() => { if(script.parentNode) document.body.removeChild(script); }, 1500);
    }

    // SEARCH
    function doSearch() {
        const q = document.getElementById('user-search').value.trim();
        if(!q) return;
        apiCall(`action=searchUsers&query=${encodeURIComponent(q)}`, "renderSearch");
    }

    window.renderSearch = function(users) {
        const resBox = document.getElementById('search-results');
        if(!users || users.length === 0) { resBox.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem">Not found</div>'; return; }
        resBox.innerHTML = users.map(u => `
            <div class="suggest-card">
                <span>${u.name}</span>
                <span class="btn-add" onclick="addFriend('${u.name}')">+ Add</span>
            </div>`).join('');
    };

    // SUGGESTIONS
    function loadSuggestions() { apiCall(`action=getSuggestions`, "renderSuggestions"); }
    window.renderSuggestions = function(data) {
        const list = document.getElementById('suggestions-list');
        if(!data || data.length === 0) { list.innerHTML = '<div style="color:var(--text-muted); font-size:0.7rem">No new suggestions</div>'; return; }
        list.innerHTML = data.slice(0, 3).map(u => `
            <div class="suggest-card">
                <span style="font-size:0.85rem">${u.name}</span>
                <span class="btn-add" onclick="addFriend('${u.name}')">Connect</span>
            </div>
        `).join('');
    };

    window.addFriend = function(name) { apiCall(`action=addFriend&friend=${encodeURIComponent(name)}`, "afterAdd"); };
    window.afterAdd = function() { document.getElementById('search-results').innerHTML = ""; loadFriends(); loadSuggestions(); };

    // FRIENDS & MESSAGES
    function loadFriends() { apiCall(`action=getFriends`, "renderFriends"); }
    window.renderFriends = function(data) {
        const list = document.getElementById('friends-list');
        const reqList = document.getElementById('requests-list');
        
        // Render Requests
        reqList.innerHTML = (data.requests?.length > 0) ? data.requests.map(r => `
            <div class="suggest-card" style="background: rgba(34, 197, 94, 0.1);">
                <span style="font-size:0.85rem">${r.name}</span>
                <span class="btn-add" style="color:#22c55e" onclick="acceptFriend('${r.name}')">Accept</span>
            </div>
        `).join('') : '<div style="color:var(--text-muted); font-size:0.7rem">No pending requests</div>';

        // Render Friends List
        list.innerHTML = data.friends.map(f => `
            <div class="friend-item ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')">
                <div class="avatar">${f.name[0]}<div class="dot"></div></div>
                <span>${f.name}</span>
            </div>
        `).join('');
    };

    window.acceptFriend = function(name) { apiCall(`action=acceptFriend&friend=${encodeURIComponent(name)}`, "loadFriends"); };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        document.getElementById('header-avatar').innerText = name[0];
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); 
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = function(msgs) {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value; input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        loadMessages();
    }

    setInterval(() => { loadFriends(); loadSuggestions(); if(activeFriend) loadMessages(); }, 5000);
    loadFriends(); loadSuggestions();
</script>
</body>
</html>
