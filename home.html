<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJT Portal</title>
    <style>
        :root { --sidebar: #111827; --primary: #3b82f6; --bg: #f3f4f6; }
        * { box-sizing: border-box; }
        
        /* THE FIX: Use dvh (dynamic viewport height) for mobile browsers */
        html, body { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh; 
            width: 100vw; overflow: hidden; 
            font-family: -apple-system, sans-serif; 
        }
        
        body { display: flex; background: var(--bg); }

        /* Sidebar - Sliding Logic */
        .sidebar { 
            width: 280px; background: var(--sidebar); color: white; display: flex; 
            flex-direction: column; padding: 20px; transition: 0.3s; z-index: 1000;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100dvh; }
            .sidebar.open { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        }

        /* Main Chat Area - Flexible Layout */
        .main-chat { 
            flex: 1; display: flex; flex-direction: column; 
            background: white; height: 100dvh; position: relative; 
        }

        /* Header - Stay at top */
        .chat-header { 
            height: 60px; min-height: 60px;
            padding: 0 15px; border-bottom: 1px solid #eee; 
            display: flex; align-items: center; gap: 10px; 
            font-weight: bold; background: white;
        }

        .menu-toggle { 
            display: none; background: #eee; border: none; padding: 8px; 
            border-radius: 6px; cursor: pointer;
        }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        /* Chat Window - The middle part that shrinks when keyboard opens */
        #chat-window { 
            flex: 1; padding: 15px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 10px; 
            background: #f9fafb;
        }

        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #e5e7eb; color: black; }

        /* Input Area - Stay at bottom */
        .input-area { 
            height: 70px; min-height: 70px;
            padding: 10px; border-top: 1px solid #eee; 
            display: flex; gap: 8px; background: white; align-items: center;
        }
        
        #msg-input { 
            flex: 1; padding: 12px; border: 1px solid #ddd; 
            border-radius: 20px; outline: none; font-size: 16px; 
        }
        
        .btn-send { 
            background: var(--primary); color: white; border: none; 
            padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        /* Lists and UI helper classes */
        .friend-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .friend-item.active { background: #1f2937; }
        .logout-btn { margin-top: auto; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <b style="color: #3b82f6;">OJT CONNECT v2.0</b>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:20px;">×</button>
        </div>
        <div class="friends-list" id="friends-list"></div>
        <div style="margin-top:auto; font-size: 0.8rem; border-top: 1px solid #374151; padding-top: 10px;">
            Logged as: <b id="my-name"></b>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <span id="chat-target">Select a friend</span>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" id="send-btn" onclick="send()">Send</button>
        </div>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqHFa-SUSDC7uE3nJBdYSG2lhtuQb2FaVpybW2yT4gBoFdGGVyYAIQvTGEdJPv8rUU/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem("username"); window.location.href = "index.html"; }

    function apiCall(params, callback) {
        const script = document.createElement('script');
        script.src = `${scriptURL}?${params}&callback=${callback}&me=${encodeURIComponent(myName)}`;
        document.body.appendChild(script);
        setTimeout(() => document.body.removeChild(script), 1000);
    }

    function loadFriends() { apiCall(`action=getFriends`, "renderFriends"); }

    window.renderFriends = function(data) {
        const list = document.getElementById('friends-list');
        let html = "";
        data.friends.forEach(f => {
            html += `<div class="friend-item ${activeFriend === f.name ? 'active' : ''}" onclick="openChat('${f.name}')">
                <div style="width:8px; height:8px; border-radius:50%; background:#22c55e;"></div> <span>${f.name}</span></div>`;
        });
        list.innerHTML = html;
    };

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = name;
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); 
        loadMessages();
    }

    function loadMessages() {
        if(!activeFriend) return;
        apiCall(`action=getMessages&friend=${encodeURIComponent(activeFriend)}`, "renderMessages");
    }

    window.renderMessages = function(msgs) {
        document.getElementById('chat-window').innerHTML = msgs.map(m => `
            <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const win = document.getElementById('chat-window'); 
        win.scrollTop = win.scrollHeight;
    };

    async function send() {
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        if(!input.value.trim() || !activeFriend) return;

        const text = input.value;
        input.value = "";
        sendBtn.disabled = true; // Prevent double taps

        // THE FIX: Standard fetch for reliability
        try {
            await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
            loadMessages();
        } catch(e) { console.error("Send failed", e); }
        
        sendBtn.disabled = false;
        input.focus();
    }

    // Faster updates for mobile responsiveness
    setInterval(() => { 
        loadFriends(); 
        if(activeFriend) loadMessages(); 
    }, 4000);
    loadFriends();
</script>
</body>
</html>
