<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Dashboard - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1877f2; --success: #42b72a; --bg: #f0f2f5; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #chat-window { height: 250px; overflow-y: auto; border: 1px solid #dddfe2; padding: 15px; border-radius: 8px; background: #f9f9f9; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; font-size: 14px; background: #e4e6eb; align-self: flex-start; line-height: 1.4; }
        .user-label { font-size: 11px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 3px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #dddfe2; border-radius: 25px; outline: none; font-size: 14px; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .status-badge { font-size: 13px; color: #1877f2; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .dot { height: 10px; width: 10px; background: var(--success); border-radius: 50%; }
    </style>
</head>
<body>
    <nav>
        <span style="font-weight: bold;"><i class="fa-solid fa-chart-line"></i> Dashboard</span>
        <a href="index.html" style="color: white; text-decoration: none; font-size: 13px; opacity: 0.8;">Log Out</a>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin-top: 0;">Hello, <span id="user-name">Guest</span>!</h2>
            <div class="status-badge"><div class="dot"></div> Online Users: <span id="online-list">Loading...</span></div>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-comments"></i> Live Conversation</h3>
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwJcFtextFeGl1oF5N2HQyJKQyojR48Jphb6592E5AR9lR5h5r41ULNyIkmu53Mau71/exec";
        const myName = localStorage.getItem("ojt_user") || "Guest";
        document.getElementById('user-name').innerText = myName;

        async function updateDashboard() {
            try {
                // Fetch Online Users
                const uRes = await fetch(`${scriptURL}?action=getOnlineUsers`);
                const users = await uRes.json();
                document.getElementById('online-list').innerText = users.join(', ');

                // Fetch Chat History
                const mRes = await fetch(`${scriptURL}?action=getMessages`);
                const msgs = await mRes.json();
                const window = document.getElementById('chat-window');
                window.innerHTML = msgs.map(m => `
                    <div class="msg">
                        <span class="user-label">${m.user}</span>
                        ${m.text}
                    </div>
                `).join('');
                window.scrollTop = window.scrollHeight;
            } catch(e) { console.error("Data refresh failed."); }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            const text = encodeURIComponent(input.value);
            input.value = "";
            await fetch(`${scriptURL}?action=sendMessage&username=${myName}&text=${text}`);
            updateDashboard();
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
