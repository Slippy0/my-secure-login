<!DOCTYPE html>
<html>
<head>
    <title>OJT Portal</title>
    <style>
        :root { --sidebar: #111827; --primary: #3b82f6; --bg: #ffffff; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #f3f4f6; }
        .sidebar { width: 280px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-row { display: flex; gap: 5px; margin-bottom: 10px; position: relative; }
        input#user-search { flex: 1; padding: 8px; border-radius: 4px; border: none; background: #374151; color: white; }
        .btn-find { padding: 8px 12px; background: #0ea5e9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        #search-results { background: #1f2937; border-radius: 4px; position: absolute; top: 40px; width: 100%; z-index: 10; max-height: 150px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .res-item { padding: 10px; border-bottom: 1px solid #374151; cursor: pointer; font-size: 0.8rem; display: flex; justify-content: space-between; }
        .friends-list { flex: 1; overflow-y: auto; }
        .friend-item { padding: 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: 0.2s; }
        .friend-item:hover { background: #1f2937; }
        .friend-item.active { background: #374151; border-left: 4px solid var(--primary); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
        .offline { background: #9ca3af; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; font-weight: bold; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 60%; font-size: 0.9rem; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #e5e7eb; color: black; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">OJT CONNECT <span style="font-size:0.7rem; color:#6b7280;">v2.0</span></div>
        <div class="search-row">
            <input type="text" id="user-search" placeholder="Find people..." onkeypress="if(event.key==='Enter') doSearch()">
            <button class="btn-find" onclick="doSearch()">Find</button>
            <div id="search-results"></div>
        </div>
        <div class="friends-list" id="friends-list">
            <p style="color: #6b7280; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 10px;">DIRECT MESSAGES</p>
        </div>
        <div style="font-size: 0.8rem; border-top: 1px solid #374151; padding-top: 10px; margin-top: 10px;">
            Logged as: <b id="my-name"></b>
        </div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <span id="chat-target">Select a friend to start</span>
            <span style="color: #22c55e; font-size: 0.7rem;">● SYSTEM LIVE</span>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">Send</button>
        </div>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxeLbilS4uSwDVyd9WABRMSD6MXgTwy7wVV9FXEjpRgHxfBpF0xFgKlKTpqoDGhn5qn/exec";
    const myName = localStorage.getItem("username") || "Guest";
    document.getElementById('my-name').innerText = myName;
    let activeFriend = null;

    async function doSearch() {
        const query = document.getElementById('user-search').value.trim();
        const resBox = document.getElementById('search-results');
        if(!query) return;
        resBox.innerHTML = "<div class='res-item'>Searching...</div>";
        try {
            const res = await fetch(`${scriptURL}?action=searchUsers&me=${encodeURIComponent(myName)}&query=${encodeURIComponent(query)}`);
            const users = await res.json();
            if(users.length === 0) { resBox.innerHTML = "<div class='res-item'>No one found</div>"; return; }
            resBox.innerHTML = users.map(u => `
                <div class="res-item" onclick="addFriend('${u.name}')">
                    <span><span class="dot ${u.online?'online':'offline'}" style="display:inline-block; margin-right:5px;"></span>${u.name}</span>
                    <span style="color:#38bdf8; font-weight:bold;">+ Add</span>
                </div>
            `).join('');
        } catch(e) {
            resBox.innerHTML = "<div class='res-item' style='color:#ff4444;'>Error: Click 'Dangerous' badge to Allow.</div>";
        }
    }

    async function addFriend(name) {
        await fetch(`${scriptURL}?action=addFriend&me=${encodeURIComponent(myName)}&friend=${encodeURIComponent(name)}`, {mode:'no-cors'});
        document.getElementById('search-results').innerHTML = "";
        document.getElementById('user-search').value = "";
        setTimeout(loadFriends, 1000);
    }

    async function loadFriends() {
        try {
            const res = await fetch(`${scriptURL}?action=getFriends&me=${encodeURIComponent(myName)}`);
            const friends = await res.json();
            const list = document.getElementById('friends-list');
            list.innerHTML = `<p style="color: #6b7280; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 10px;">DIRECT MESSAGES</p>`;
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = `friend-item ${activeFriend === f.name ? 'active' : ''}`;
                div.onclick = () => openChat(f.name);
                div.innerHTML = `<div class="dot ${f.online ? 'online' : 'offline'}"></div> <span>${f.name}</span>`;
                list.appendChild(div);
            });
        } catch(e) {}
    }

    function openChat(name) {
        activeFriend = name;
        document.getElementById('chat-target').innerText = "Chatting with " + name;
        loadMessages();
        loadFriends();
    }

    async function loadMessages() {
        if(!activeFriend) return;
        try {
            const res = await fetch(`${scriptURL}?action=getMessages&me=${encodeURIComponent(myName)}&friend=${encodeURIComponent(activeFriend)}`);
            const msgs = await res.json();
            document.getElementById('chat-window').innerHTML = msgs.map(m => `
                <div class="msg ${m.user.toLowerCase() === myName.toLowerCase() ? 'me' : 'them'}">${m.text}</div>
            `).join('');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !activeFriend) return;
        const text = input.value;
        input.value = "";
        await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myName)}&recipient=${encodeURIComponent(activeFriend)}&text=${encodeURIComponent(text)}`, {mode:'no-cors'});
        setTimeout(loadMessages, 500);
    }

    setInterval(() => { 
        loadFriends(); 
        if(activeFriend) loadMessages(); 
    }, 5000);
    loadFriends();
</script>
</body>
</html>
