<!DOCTYPE html>
<html>
<head>
    <title>OJT Text Chat</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .chat-card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #chat-window { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { display: flex; flex-direction: column; }
        .msg-user { font-size: 11px; font-weight: bold; color: #65676b; margin-left: 5px; margin-bottom: 2px; }
        .msg-text { background: #e4e6eb; padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 85%; width: fit-content; }
        .is-me { align-self: flex-end; align-items: flex-end; }
        .is-me .msg-text { background: #0084ff; color: white; }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0;">User: <span id="my-name" style="color:#0084ff;">...</span></h3>
            <a href="index.html" style="font-size:12px; color:gray; text-decoration:none;">Logout</a>
        </div>
        
        <div id="chat-window">Connecting to server...</div>

        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        // PASTE YOUR NEW DEPLOY URL HERE
        const scriptURL = "REPLACE_WITH_YOUR_NEW_DEPLOY_URL";
        const myUsername = localStorage.getItem("username") || "Guest";
        document.getElementById('my-name').innerText = myUsername;

        async function fetchMessages() {
            try {
                const response = await fetch(`${scriptURL}?action=getMessages`);
                const messages = await response.json();
                const window = document.getElementById('chat-window');
                
                window.innerHTML = messages.map(m => {
                    const isMe = m.user === myUsername;
                    return `
                        <div class="msg-box ${isMe ? 'is-me' : ''}">
                            <div class="msg-user">${m.user}</div>
                            <div class="msg-text">${m.text}</div>
                        </div>
                    `;
                }).join('');
                window.scrollTop = window.scrollHeight;
            } catch (e) {
                document.getElementById('chat-window').innerHTML = "<center style='color:red;'><b>Connection Blocked</b><br>Click 'Dangerous' badge & select 'Visit this unsafe site'.</center>";
            }
        }

        async function send() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            input.value = "";
            await fetch(`${scriptURL}?action=sendMessage&username=${encodeURIComponent(myUsername)}&text=${encodeURIComponent(val)}`, { mode: 'no-cors' });
            setTimeout(fetchMessages, 800);
        }

        setInterval(fetchMessages, 3000);
        fetchMessages();
    </script>
</body>
</html>
